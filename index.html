.status-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:6px;transition:background .3s}
.status-dot.live{background:#27ae60;animation:pulse 1.5s infinite}

.status-txt{color:#6a8ab0}

.search-wrap{padding:10px 16px 0}

.tab.active{background:#c8a84b;color:#0a0a14;border-bottom:2px solid #c8a84b;border-radius:6px 6px 0 0}
.content{padding:0 16px 80px}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:12px 0 8px}

.count{font-size:11px;color:#4a6080;margin-bottom:8px}
.match-card{background:#10192a;border-radius:10px;margin-bottom:8px;padding:11px 13px;border-left:3px solid #2a3a5a}
.card-top{display:flex;align-items:center;gap:8px}
.group-badge{min-width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.teams-block{flex:1;min-width:0}
.team-line{display:flex;align-items:center;gap:6px;padding:2px 0}
.team-flag{font-size:15px;flex-shrink:0}

.team-score{font-size:18px;font-weight:900;min-width:24px;text-align:right;color:#fff}

.vs-badge{font-size:10px;color:#4a6080;min-width:24px;text-align:right}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:5px}

.badge-ft{background:#2a3a5a;color:#8fa3c8}
.badge-sched{background:#1a2235;color:#5a7fa8}
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px}
.group-box{background:#10192a;border-radius:10px;padding:11px 13px}

.team-row-g:last-child{border-bottom:none}
.team-row-g:active{background:#1a2535;border-radius:6px}
.team-name-g{font-size:12px;color:#ddeeff;flex:1}
.standings-wrap{padding-top:14px}
.standings-group{background:#10192a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.standings-header{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #1a2535}
.standings-title{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase}

.pos-num{color:#6a8ab0;font-size:10px;margin-right:4px}

.loader{text-align:center;padding:40px 20px;color:#4a6080;font-size:13px}
.hidden{display:none}

    allMatches=FALLBACK;
  }
  renderCurrent();
}

function parseMatches(data){
  if(!data||!data.matches) return FALLBACK;
  return data.matches.map(m=>{
    let group='KO';
    if(m.group){const g=m.group.replace('Group ','').trim(); if(g.length===1) group=g;}
    if(group==='KO'&&m.team1){for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(m.team1)||ts.includes(m.team2)){group=g;break;}}}
    const s1=m.score&&m.score.ft?m.score.ft[0]:null;
    const s2=m.score&&m.score.ft?m.score.ft[1]:null;
    const dateObj=m.date?new Date(m.date):null;
    return{
      date:m.date||'',
      dateDisp:dateObj?dateObj.toLocaleDateString('lv-LV',{day:'2-digit',month:'short'}):'?',
      dayDisp:dateObj?dateObj.toLocaleDateString('lv-LV',{weekday:'short'}):'',
      group,home:m.team1||'TBD',away:m.team2||'TBD',
      score1:s1,score2:s2,status:s1!==null?'ft':'scheduled',
      venue:m.ground||'',round:m.round||'',isKO:group==='KO'
    };
  });
}

function setStatus(t,txt){
  document.getElementById('statusDot').className='status-dot '+t;
  document.getElementById('statusTxt').textContent=txt;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['results','schedule','standings','groups'][i]===tab));
  ['results','schedule','standings','groups'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab));
  renderCurrent();
}
function renderCurrent(){
  if(currentTab==='results') renderResults();
  if(currentTab==='schedule') renderSchedule();
  if(currentTab==='standings') renderStandings();
  if(currentTab==='groups') renderGroups();
}

// ── Results ────────────────────────────────────────────────────────────────
function renderResults(){
  const s=getSearch();
  const today=new Date().toISOString().slice(0,10);
  const el=document.getElementById('tab-results');

  const todayMatches=allMatches.filter(m=>m.date===today&&matchSearch(m,s));
  const played=allMatches.filter(m=>m.status==='ft'&&matchSearch(m,s)).sort((a,b)=>b.date.localeCompare(a.date));
  // Next upcoming (after today)
  const upcoming=allMatches.filter(m=>m.status!=='ft'&&m.date>today&&matchSearch(m,s)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  let html='';

  // TODAY
  if(todayMatches.length){
    html+=`<div style="font-size:11px;font-weight:800;letter-spacing:2px;color:#27ae60;text-transform:uppercase;padding:12px 0 6px">🟢 Šodien — ${todayMatches.length} spēles</div>`;
    html+=todayMatches.map(m=>cardHTML(m,'today')).join('');
  }

  // RESULTS
  if(played.length){
    html+=`<div style="font-size:11px;font-weight:800;letter-spacing:2px;color:#c8a84b;text-transform:uppercase;padding:12px 0 6px">✅ Rezultāti — ${played.length} spēles</div>`;
    html+=played.map(m=>cardHTML(m)).join('');
  }

  // UPCOMING
  if(upcoming.length&&!s){
    html+=`<div style="font-size:11px;font-weight:800;letter-spacing:2px;color:#2980b9;text-transform:uppercase;padding:12px 0 6px">📅 Nākamās spēles</div>`;
    html+=upcoming.map(m=>cardHTML(m)).join('');
  }

  if(!html){
    html='<div class="loader">⚽ Nav spēļu šodien.<br><br>';
    const next=allMatches.filter(m=>m.status!=='ft').sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(next) html+=`<small style="color:#4a6080">Nākamā spēle: ${next.dateDisp}<br>${next.home} vs ${next.away}</small>`;
    html+='</div>';
  }

  el.innerHTML=html;
}

// ── Schedule ───────────────────────────────────────────────────────────────
function renderSchedule(){
  const s=getSearch();
  const grps=['ALL','A','B','C','D','E','F','G','H','I','J','K','L','KO'];
  const el=document.getElementById('tab-schedule');
  const filters=`<div class="filters">${grps.map(g=>`<button class="filter-btn ${groupFilter===g?'active':''}"
    style="${groupFilter===g&&g!=='ALL'&&g!=='KO'?'background:'+GC[g]+';':groupFilter===g?'background:#c8a84b;color:#0a0a14;':''}"
    onclick="setGF('${g}')">${g==='ALL'?'Visas':g==='KO'?'Izsl.':'Gr.'+g}</button>`).join('')}</div>`;
  const list=allMatches.filter(m=>(groupFilter==='ALL'||(groupFilter==='KO'?m.isKO:m.group===groupFilter))&&matchSearch(m,s));
  el.innerHTML=filters+`<div class="count">${list.length} spēles</div>`+list.map(m=>cardHTML(m)).join('');
}
function setGF(g){groupFilter=g;renderSchedule();}

// ── Standings ──────────────────────────────────────────────────────────────
function renderStandings(){
  const tbl=buildTable();
  const el=document.getElementById('tab-standings');
  let html='<div class="standings-wrap">';
  for(const [g,teams] of Object.entries(tbl)){
    const sorted=Object.entries(teams).sort((a,b)=>{
      if(b[1].pts!==a[1].pts) return b[1].pts-a[1].pts;
      if((b[1].gf-b[1].ga)!==(a[1].gf-a[1].ga)) return (b[1].gf-b[1].ga)-(a[1].gf-a[1].ga);
      return b[1].gf-a[1].gf;
    });
    html+=`<div class="standings-group">
      <div class="standings-header">
        <div class="group-badge" style="background:${GC[g]};min-width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff">${g}</div>
        <div class="standings-title" style="color:${GC[g]}">GRUPA ${g}</div>
      </div>
      <table class="standings-table"><thead><tr>
        <th>Komanda</th><th>S</th><th>U</th><th>N</th><th>Z</th><th>GF</th><th>GA</th><th>Pts</th>
      </tr></thead><tbody>
      ${sorted.map(([name,s],i)=>`<tr class="${i<2?'qualified':i===2?'maybe':''}" onclick="openTeam('${name}')">
        <td><span class="pos-num">${i+1}</span>${FLAGS[name]||'🌍'} ${name}</td>
        <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}</td><td>${s.ga}</td>
        <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${s.pts}</strong></td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }
  html+='</div><div class="info-box"><strong>Krāsas:</strong> 🟢 Kvalificējas &nbsp;·&nbsp; 🟡 Iespējams &nbsp;·&nbsp; Spiedi uz komandu → profils</div>';
  el.innerHTML=html;
}

// ── Team profile modal ─────────────────────────────────────────────────────
function openTeam(name){
  // Find group
  let grp='?';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(name)){grp=g;break;}}

  document.getElementById('modalName').textContent=name;
  document.getElementById('modalFlag').textContent=FLAGS[name]||'🌍';
  document.getElementById('modalSub').textContent=`Grupa ${grp} · FIFA Pasaules kauss 2026`;

  // Build modal body
  const color=GC[grp]||'#555';
  let body='';

  // 1) Group standings
  const tbl=buildTable();
  if(tbl[grp]){
    const sorted=Object.entries(tbl[grp]).sort((a,b)=>{
      if(b[1].pts!==a[1].pts) return b[1].pts-a[1].pts;
      if((b[1].gf-b[1].ga)!==(a[1].gf-a[1].ga)) return (b[1].gf-b[1].ga)-(a[1].gf-a[1].ga);
      return b[1].gf-a[1].gf;
    });
    body+=`<div class="modal-section">
      <div class="modal-section-title" style="color:${color}">📊 Grupas tabula — Grupa ${grp}</div>
      <table class="mini-stand"><thead><tr>
        <th>Komanda</th><th>S</th><th>U</th><th>N</th><th>Z</th><th>GF:GA</th><th>Pts</th>
      </tr></thead><tbody>
      ${sorted.map(([n,s],i)=>`<tr class="${n===name?'highlight':''}">
        <td><span class="pos-num">${i+1}</span>${FLAGS[n]||'🌍'} ${n}</td>
        <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}:${s.ga}</td>
        <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${s.pts}</strong></td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }

  // 2) Team matches
  const teamMatches=allMatches.filter(m=>m.home===name||m.away===name);
  if(teamMatches.length){
    body+=`<div class="modal-section">
      <div class="modal-section-title" style="color:${color}">⚽ Spēles</div>
      ${teamMatches.map(m=>{
        const isHome=m.home===name;
        const opp=isHome?m.away:m.home;
        const s1=isHome?m.score1:m.score2;
        const s2=isHome?m.score2:m.score1;
        const hasScore=m.status==='ft';
        let res='';
        if(hasScore){
          if(s1>s2) res='<span style="color:#27ae60;font-weight:800;font-size:10px">U</span>';
          else if(s1<s2) res='<span style="color:#e63946;font-weight:800;font-size:10px">Z</span>';
          else res='<span style="color:#f39c12;font-weight:800;font-size:10px">N</span>';
        }
        return `<div class="mini-match" style="border-left-color:${color}">
          <div class="mini-match-teams">
            <div class="mini-team"><span>${FLAGS[name]||'🌍'}</span><span>${name}</span></div>
            ${hasScore?`<div class="mini-score">${s1} : ${s2}</div>`:'<div class="mini-score sched">vs</div>'}
            <div class="mini-team" style="justify-content:flex-end"><span>${opp}</span><span>${FLAGS[opp]||'🌍'}</span></div>
          </div>
          <div class="mini-meta">${m.dateDisp} · ${m.venue} ${hasScore?'· FT '+res:''}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // 3) Squad
  const squad=SQUADS[name];
  if(squad){
    const positions=['GK','DEF','MID','FWD'];
    body+=`<div class="modal-section">
      <div class="modal-section-title" style="color:${color}">👕 Spēlētāji</div>
      <div class="player-grid">
      ${squad.map(p=>`<div class="player-card">
        <div class="player-pos">${p.pos}</div>

        <div class="player-club">${p.club}</div>

    </div>`;
  } else {
    body+=`<div class="modal-section">
      <div class="modal-section-title" style="color:${color}">👕 Spēlētāji</div>
      <div class="no-data">Spēlētāju dati tiks pievienoti drīzumā</div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('teamModal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('teamModal').classList.add('hidden');

}

// ── Helpers ────────────────────────────────────────────────────────────────
function buildTable(){
  const tbl={};
  for(const [g,teams] of Object.entries(GROUPS_STATIC)){
    tbl[g]={};
    for(const t of teams) tbl[g][t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
  }
  for(const m of allMatches){
    if(m.status!=='ft'||m.isKO) continue;
    const g=m.group; if(!tbl[g]) continue;
    const h=m.home,a=m.away,s1=m.score1,s2=m.score2;
    if(!tbl[g][h]) tbl[g][h]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!tbl[g][a]) tbl[g][a]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    tbl[g][h].p++;tbl[g][a].p++;
    tbl[g][h].gf+=s1;tbl[g][h].ga+=s2;
    tbl[g][a].gf+=s2;tbl[g][a].ga+=s1;
    if(s1>s2){tbl[g][h].w++;tbl[g][h].pts+=3;tbl[g][a].l++;}
    else if(s1<s2){tbl[g][a].w++;tbl[g][a].pts+=3;tbl[g][h].l++;}
    else{tbl[g][h].d++;tbl[g][h].pts++;tbl[g][a].d++;tbl[g][a].pts++;}
  }
  return tbl;
}

function getSearch(){return document.getElementById('searchInput').value.toLowerCase();}
function matchSearch(m,s){if(!s)return true;return[m.home,m.away,m.venue,m.dateDisp,m.round,m.group].some(v=>(v||'').toLowerCase().includes(s));}

function cardHTML(m,mode){
  const hf=FLAGS[m.home]||'🌍',af=FLAGS[m.away]||'🌍';
  const hasScore=m.status==='ft';
  const h1w=hasScore&&m.score1>m.score2,h2w=hasScore&&m.score2>m.score1;
  const color=m.isKO?'#c8a84b':(GC[m.group]||'#555');
  const isToday=mode==='today';
  let badge;
  if(hasScore) badge='<span class="status-badge badge-ft">FT</span>';
  else if(isToday) badge='<span class="status-badge" style="background:#1a6a3a;color:#7fffb0;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px">ŠODIEN</span>';
  else badge='<span class="status-badge badge-sched">'+m.time+'</span>';
  const gl=m.isKO?`<div style="font-size:9px;color:${color};font-weight:800;min-width:24px;flex-shrink:0">KO</div>`
    :`<div class="group-badge" style="background:${color}">${m.group}</div>`;
  return`<div class="match-card" style="border-left-color:${color};${isToday?'background:#0d1f2a':''}">
    <div class="card-top">${gl}
      <div class="teams-block">
        <div class="team-line">
          <span class="team-flag">${hf}</span>
          <span class="team-name" style="font-weight:${h1w?900:700}" onclick="openTeam('${m.home}')">${m.home}</span>
          ${hasScore?`<span class="team-score ${h1w?'winner':''}">${m.score1}</span>`:'<span class="vs-badge">–</span>'}
        </div>
        <div class="team-line">
          <span class="team-flag">${af}</span>
          <span class="team-name" style="font-weight:${h2w?900:700}" onclick="openTeam('${m.away}')">${m.away}</span>
          ${hasScore?`<span class="team-score ${h2w?'winner':''}">${m.score2}</span>`:'<span class="vs-badge">–</span>'}
        </div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="venue-txt">📍 ${m.venue}</span>
      <div style="display:flex;align-items:center;gap:6px">${badge}<span class="date-txt">${m.dateDisp}</span></div>
    </div>
  </div>`;
}
