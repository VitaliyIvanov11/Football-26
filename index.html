<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WC 2026">
<meta name="theme-color" content="#0a0a14">
<title>FIFA World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a14;color:#eaeaea;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(135deg,#0a1628 0%,#1a2d55 50%,#0a1628 100%);border-bottom:2px solid #c8a84b;padding:18px 16px 14px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:4px;color:#c8a84b;text-transform:uppercase;margin-bottom:5px}
h1{font-size:22px;font-weight:900;color:#fff}
.hinfo{margin-top:5px;font-size:11px;color:#8fa3c8}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#0d1520;border-bottom:1px solid #1a2535;font-size:11px}
.sdot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:6px}
.sdot.live{background:#27ae60;animation:pulse 1.5s infinite}
.sdot.error{background:#e63946}
.sdot.loading{background:#f39c12;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{color:#6a8ab0}
.rbtn{background:#1a2d55;border:1px solid #2a3a5a;border-radius:6px;padding:4px 10px;color:#8fa3c8;font-size:11px;cursor:pointer}
.tabs{display:flex;border-bottom:1px solid #1e2a45}
.tab{flex:1;padding:9px 4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;cursor:pointer;background:transparent;color:#6a8ab0;border-bottom:2px solid transparent}
.tab.active{background:#c8a84b;color:#0a0a14;border-bottom:2px solid #c8a84b;border-radius:6px 6px 0 0}
.content{padding:0 16px 80px}
.sec-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:12px 0 6px}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 8px}
.fbtn{padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#1a2235;color:#8fa3c8}
.fbtn.active{color:#fff}
.loader{text-align:center;padding:40px 16px;color:#4a6080;font-size:13px;line-height:2}
.hidden{display:none}
.mc{background:#10192a;border-radius:10px;margin-bottom:8px;padding:11px 13px;border-left:3px solid #2a3a5a}
.mc.is-live{background:#091f14}
.mc-top{display:flex;align-items:center;gap:8px}
.gbadge{min-width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.tblock{flex:1;min-width:0}
.tline{display:flex;align-items:center;gap:6px;padding:2px 0}
.tflag{font-size:15px;flex-shrink:0}
.tname{font-size:13px;font-weight:700;color:#ddeeff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline dotted #3a5a8a}
.tscore{font-size:20px;font-weight:900;min-width:26px;text-align:right}
.tscore.win{color:#c8a84b}
.tscore.draw{color:#eaeaea}
.vsb{font-size:10px;color:#4a6080;min-width:26px;text-align:right}
.mc-bot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.vtxt{font-size:10px;color:#5a7fa8}
.dtxt{font-size:11px;font-weight:800;color:#c8a84b}
.sbadge{font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.sb-live{background:#27ae60;color:#fff;animation:pulse 1s infinite}
.sb-ft{background:#2a3a5a;color:#8fa3c8}
.sb-sched{background:#1a2235;color:#5a7fa8}
.sb-today{background:#1a3a1a;color:#7fffb0}
.scorers{font-size:10px;color:#7fa8c8;padding:3px 0 0 32px;line-height:1.7}
.stbl{width:100%;border-collapse:collapse;background:#10192a;border-radius:8px;overflow:hidden;margin-bottom:10px}
.stbl th{font-size:9px;color:#4a6080;text-align:center;padding:6px 3px;text-transform:uppercase}
.stbl th:first-child{text-align:left;padding-left:10px}
.stbl td{font-size:11px;text-align:center;padding:7px 3px;border-top:1px solid #111c2a;cursor:pointer}
.stbl td:first-child{text-align:left;padding-left:10px}
.stbl tr:active td{background:#1a2535}
.stbl tr.q td{background:#0d1f12}
.stbl tr.m td{background:#1a1508}
.pnum{color:#6a8ab0;font-size:10px;margin-right:4px}
.sg{background:#10192a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sh{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #1a2535}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px}
.gb{background:#10192a;border-radius:10px;padding:11px 13px}
.gt{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.tr{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #1e2a3a;cursor:pointer}
.tr:last-child{border-bottom:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;flex-direction:column;overflow:hidden}
.modal.hidden{display:none}
.mhdr{background:linear-gradient(135deg,#0a1628,#1a2d55);padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #c8a84b;flex-shrink:0}
.mback{background:#1a2d55;border:1px solid #2a3a5a;border-radius:8px;padding:6px 12px;color:#8fa3c8;font-size:12px;cursor:pointer}
.mbody{flex:1;overflow-y:auto;padding:14px 16px 40px}
.msec{margin-bottom:18px}
.mstitle{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #1e2a45}
.mini-st{width:100%;border-collapse:collapse;background:#10192a;border-radius:8px;overflow:hidden}
.mini-st th{font-size:9px;color:#4a6080;text-align:center;padding:6px 3px;text-transform:uppercase}
.mini-st th:first-child{text-align:left;padding-left:10px}
.mini-st td{font-size:12px;text-align:center;padding:7px 3px;border-top:1px solid #111c2a}
.mini-st td:first-child{text-align:left;padding-left:10px}
.mini-st tr.hl td{background:#1a2a3a;font-weight:700}
.mmatch{background:#10192a;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #2a3a5a}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pc{background:#10192a;border-radius:8px;padding:8px 10px}
.ppos{font-size:9px;color:#c8a84b;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.pname{font-size:12px;color:#ddeeff;margin-top:2px;font-weight:600}
.pclub{font-size:10px;color:#5a7fa8}
.ibox{margin-top:12px;padding:10px;background:#0e1520;border-radius:8px;font-size:11px;color:#6a8ab0;line-height:1.7}
.ibox strong{color:#c8a84b}
</style>
</head>
<body>
<header>
  <div class="eyebrow">FIFA</div>
  <h1>World Cup 2026 🏆</h1>
  <div class="hinfo">11.06 – 19.07 · 🇺🇸🇨🇦🇲🇽 · 104 spēles</div>
</header>
<div class="sbar">
  <div><span class="sdot" id="sdot"></span><span class="stxt" id="stxt">Ielādē...</span></div>
  <button class="rbtn" onclick="loadAll()">↻ Atjaunināt</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="sw('today')">Šodien</button>
  <button class="tab" onclick="sw('results')">Rezultāti</button>
  <button class="tab" onclick="sw('schedule')">Grafiks</button>
  <button class="tab" onclick="sw('standings')">Tabula</button>
  <button class="tab" onclick="sw('groups')">Grupas</button>
</div>
<div class="content">
  <div id="tab-today"><div class="loader">⏳ Ielādē...</div></div>
  <div id="tab-results" class="hidden"></div>
  <div id="tab-schedule" class="hidden"></div>
  <div id="tab-standings" class="hidden"></div>
  <div id="tab-groups" class="hidden"></div>
</div>
<div class="modal hidden" id="modal">
  <div class="mhdr">
    <button class="mback" onclick="closeMod()">← Atpakaļ</button>
    <div style="flex:1">
      <div style="font-size:20px;font-weight:900;color:#fff" id="mname"></div>
      <div style="font-size:11px;color:#8fa3c8;margin-top:2px" id="msub"></div>
    </div>
    <div style="font-size:36px" id="mflag"></div>
  </div>
  <div class="mbody" id="mbody"></div>
</div>

<script>
const TOKEN='37de7c6d4a6a4635beaee8d1014ca51c';
const BASE='https://api.football-data.org/v4';
const GC={A:"#e63946",B:"#e67e22",C:"#27ae60",D:"#2980b9",E:"#8e44ad",F:"#16a085",G:"#c0392b",H:"#f39c12",I:"#1abc9c",J:"#2c3e50",K:"#7f8c8d",L:"#6c3483"};
const FLAGS={Mexico:"🇲🇽","South Korea":"🇰🇷","South Africa":"🇿🇦",Canada:"🇨🇦",Switzerland:"🇨🇭",Qatar:"🇶🇦",Brazil:"🇧🇷",Morocco:"🇲🇦",Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",Haiti:"🇭🇹",USA:"🇺🇸",Australia:"🇦🇺",Paraguay:"🇵🇾",Germany:"🇩🇪",Ecuador:"🇪🇨","Ivory Coast":"🇨🇮","Curaçao":"🇨🇼",Netherlands:"🇳🇱",Japan:"🇯🇵",Tunisia:"🇹🇳",Belgium:"🇧🇪",Iran:"🇮🇷",Egypt:"🇪🇬","New Zealand":"🇳🇿",Spain:"🇪🇸",Uruguay:"🇺🇾","Saudi Arabia":"🇸🇦","Cape Verde":"🇨🇻",France:"🇫🇷",Senegal:"🇸🇳",Norway:"🇳🇴",Argentina:"🇦🇷",Algeria:"🇩🇿",Austria:"🇦🇹",Jordan:"🇯🇴",Portugal:"🇵🇹",Colombia:"🇨🇴",Uzbekistan:"🇺🇿",England:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",Croatia:"🇭🇷",Panama:"🇵🇦",Ghana:"🇬🇭","Czech Republic":"🇨🇿",Turkey:"🇹🇷",Sweden:"🇸🇪","DR Congo":"🇨🇩",Iraq:"🇮🇶","Bosnia and Herzegovina":"🇧🇦"};
const GROUPS_STATIC={A:["Mexico","South Korea","South Africa","Czech Republic"],B:["Canada","Switzerland","Qatar","Bosnia and Herzegovina"],C:["Brazil","Morocco","Scotland","Haiti"],D:["USA","Australia","Paraguay","Turkey"],E:["Germany","Ecuador","Ivory Coast","Curaçao"],F:["Netherlands","Japan","Tunisia","Sweden"],G:["Belgium","Iran","Egypt","New Zealand"],H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],I:["France","Senegal","Norway","Iraq"],J:["Argentina","Algeria","Austria","Jordan"],K:["Portugal","Colombia","Uzbekistan","DR Congo"],L:["England","Croatia","Panama","Ghana"]};
const SQUADS={Argentina:[{pos:"FWD",name:"L. Messi",club:"Inter Miami"},{pos:"FWD",name:"J. Álvarez",club:"Atlético"},{pos:"MID",name:"E. Fernández",club:"Chelsea"},{pos:"MID",name:"A. Mac Allister",club:"Liverpool"},{pos:"MID",name:"R. De Paul",club:"Atlético"},{pos:"DEF",name:"C. Romero",club:"Tottenham"},{pos:"DEF",name:"N. Molina",club:"Atlético"},{pos:"GK",name:"E. Martínez",club:"Aston Villa"}],
France:[{pos:"FWD",name:"K. Mbappé",club:"Real Madrid"},{pos:"FWD",name:"A. Griezmann",club:"Atlético"},{pos:"FWD",name:"O. Dembélé",club:"PSG"},{pos:"MID",name:"A. Tchouaméni",club:"Real Madrid"},{pos:"MID",name:"E. Camavinga",club:"Real Madrid"},{pos:"DEF",name:"W. Saliba",club:"Arsenal"},{pos:"GK",name:"M. Maignan",club:"AC Milan"}],
Brazil:[{pos:"FWD",name:"Vinícius Jr.",club:"Real Madrid"},{pos:"FWD",name:"Rodrygo",club:"Real Madrid"},{pos:"FWD",name:"Raphinha",club:"Barcelona"},{pos:"MID",name:"Bruno Guimarães",club:"Newcastle"},{pos:"DEF",name:"Marquinhos",club:"PSG"},{pos:"GK",name:"Alisson",club:"Liverpool"}],
England:[{pos:"FWD",name:"H. Kane",club:"Bayern"},{pos:"FWD",name:"B. Saka",club:"Arsenal"},{pos:"FWD",name:"C. Palmer",club:"Chelsea"},{pos:"MID",name:"J. Bellingham",club:"Real Madrid"},{pos:"MID",name:"D. Rice",club:"Arsenal"},{pos:"GK",name:"J. Pickford",club:"Everton"}],
Germany:[{pos:"FWD",name:"J. Musiala",club:"Bayern"},{pos:"FWD",name:"K. Havertz",club:"Arsenal"},{pos:"MID",name:"R. Wirtz",club:"Leverkusen"},{pos:"DEF",name:"A. Rüdiger",club:"Real Madrid"},{pos:"GK",name:"M. Neuer",club:"Bayern"}],
Spain:[{pos:"FWD",name:"L. Yamal",club:"Barcelona"},{pos:"FWD",name:"N. Williams",club:"Athletic"},{pos:"MID",name:"P. Pedri",club:"Barcelona"},{pos:"MID",name:"P. Gavi",club:"Barcelona"},{pos:"GK",name:"U. Simón",club:"Athletic"}],
Portugal:[{pos:"FWD",name:"C. Ronaldo",club:"Al-Nassr"},{pos:"FWD",name:"R. Leão",club:"AC Milan"},{pos:"MID",name:"B. Fernandes",club:"Man United"},{pos:"DEF",name:"R. Dias",club:"Man City"},{pos:"GK",name:"D. Costa",club:"Al-Nassr"}],
Netherlands:[{pos:"FWD",name:"C. Gakpo",club:"Liverpool"},{pos:"MID",name:"X. Simons",club:"Leipzig"},{pos:"MID",name:"T. de Jong",club:"Barcelona"},{pos:"DEF",name:"V. van Dijk",club:"Liverpool"},{pos:"GK",name:"B. Flekken",club:"Brentford"}],
Belgium:[{pos:"FWD",name:"R. Lukaku",club:"Napoli"},{pos:"FWD",name:"L. Openda",club:"Leipzig"},{pos:"MID",name:"K. De Bruyne",club:"Man City"},{pos:"DEF",name:"W. Faes",club:"Leicester"},{pos:"GK",name:"K. Casteels",club:"Al-Qadsiah"}],
USA:[{pos:"FWD",name:"C. Pulisic",club:"AC Milan"},{pos:"FWD",name:"F. Balogun",club:"Monaco"},{pos:"MID",name:"W. McKennie",club:"Juventus"},{pos:"MID",name:"Y. Musah",club:"AC Milan"},{pos:"GK",name:"M. Turner",club:"Nottm Forest"}],
Morocco:[{pos:"FWD",name:"H. Ziyech",club:"Galatasaray"},{pos:"DEF",name:"A. Hakimi",club:"PSG"},{pos:"GK",name:"Y. Bounou",club:"Al-Hilal"}],
Croatia:[{pos:"MID",name:"L. Modrić",club:"Real Madrid"},{pos:"DEF",name:"J. Gvardiol",club:"Man City"},{pos:"GK",name:"D. Livaković",club:"Fenerbahçe"}],
Japan:[{pos:"FWD",name:"K. Mitoma",club:"Brighton"},{pos:"MID",name:"W. Endo",club:"Liverpool"},{pos:"GK",name:"S. Gonda",club:"Podbeskidzie"}],
Uruguay:[{pos:"FWD",name:"D. Núñez",club:"Liverpool"},{pos:"MID",name:"F. Valverde",club:"Real Madrid"},{pos:"DEF",name:"R. Araujo",club:"Barcelona"},{pos:"GK",name:"S. Rochet",club:"Nacional"}]};

// Name normalization — API uses different names
const NM={"Korea Republic":"South Korea","Iran":"Iran","Côte d'Ivoire":"Ivory Coast","United States":"USA","Curaçao":"Curaçao","Congo DR":"DR Congo","Bosnia and Herzegovina":"Bosnia and Herzegovina","Türkiye":"Turkey","IR Iran":"Iran"};
function norm(n){return NM[n]||n;}

let matches=[], standingsData={}, currentTab='today', gFilter='ALL', liveTimer=null;

async function apiFetch(path){
  const r=await fetch(BASE+path,{headers:{'X-Auth-Token':TOKEN}});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadAll(){
  setSt('loading','Ielādē...');
  try{
    const [mData, sData] = await Promise.all([
      apiFetch('/competitions/WC/matches'),
      apiFetch('/competitions/WC/standings')
    ]);
    matches = mData.matches||[];
    // Parse standings
    standingsData={};
    for(const sg of (sData.standings||[])){
      const letter = sg.group ? sg.group.replace('GROUP_','').replace('Group ','') : '?';
      standingsData[letter] = sg.table||[];
    }
    const hasLive = matches.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
    setSt(hasLive?'live':'live', 'Atjaunināts ' + new Date().toLocaleTimeString('lv-LV',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSt('error','Kļūda: '+e.message);
    matches=[];
  }
  renderTab();
  clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    const hasLive=matches.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
    if(hasLive) loadAll();
  },30000);
}

function setSt(t,txt){
  document.getElementById('sdot').className='sdot '+t;
  document.getElementById('stxt').textContent=txt;
}

function sw(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','results','schedule','standings','groups'][i]===tab));
  ['today','results','schedule','standings','groups'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab));
  renderTab();
}

function renderTab(){
  if(currentTab==='today')     renderToday();
  if(currentTab==='results')   renderResults();
  if(currentTab==='schedule')  renderSchedule();
  if(currentTab==='standings') renderStandings();
  if(currentTab==='groups')    renderGroups();
}

function today(){return new Date().toISOString().slice(0,10);}

function renderToday(){
  const el=document.getElementById('tab-today');
  const td=today();
  const live=matches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  const todayFT=matches.filter(m=>m.utcDate.slice(0,10)===td&&(m.status==='FINISHED'));
  const todayNS=matches.filter(m=>m.utcDate.slice(0,10)===td&&m.status==='TIMED'||m.utcDate.slice(0,10)===td&&m.status==='SCHEDULED');
  let html='';
  if(live.length){
    html+=`<div class="sec-title" style="color:#27ae60">🔴 LIVE — ${live.length} spēle${live.length>1?'s':''}</div>`;
    html+=live.map(m=>mCard(m)).join('');
  }
  if(todayFT.length){
    html+=`<div class="sec-title" style="color:#c8a84b">✅ Šodien nospēlētas</div>`;
    html+=todayFT.map(m=>mCard(m)).join('');
  }
  if(todayNS.length){
    html+=`<div class="sec-title" style="color:#2980b9">📅 Šodien vēl gaidāmas</div>`;
    html+=todayNS.map(m=>mCard(m)).join('');
  }
  if(!html){
    const next=matches.filter(m=>m.status==='TIMED'||m.status==='SCHEDULED').sort((a,b)=>a.utcDate.localeCompare(b.utcDate)).slice(0,5);
    if(next.length){
      html=`<div class="sec-title" style="color:#2980b9">📅 Nākamās spēles</div>`+next.map(m=>mCard(m)).join('');
    } else {
      html='<div class="loader">📡 Nav datu šodien</div>';
    }
  }
  el.innerHTML=html;
}

function renderResults(){
  const el=document.getElementById('tab-results');
  const done=matches.filter(m=>m.status==='FINISHED').sort((a,b)=>b.utcDate.localeCompare(a.utcDate));
  if(!done.length){el.innerHTML='<div class="loader">⚽ Rezultātu vēl nav.<br><small style="color:#4a6080">Turnīrs sākas 11. jūnijā</small></div>';return;}
  el.innerHTML=`<div style="font-size:11px;color:#4a6080;margin:10px 0 8px">${done.length} nospēlētas spēles</div>`+done.map(m=>mCard(m)).join('');
}

function renderSchedule(){
  const el=document.getElementById('tab-schedule');
  const grps=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  const filters=`<div class="filters">${grps.map(g=>`<button class="fbtn ${gFilter===g?'active':''}"
    style="${gFilter===g&&g!=='ALL'?'background:'+GC[g]+';':gFilter===g?'background:#c8a84b;color:#0a0a14;':''}"
    onclick="setGF('${g}')">${g==='ALL'?'Visas':'Gr.'+g}</button>`).join('')}</div>`;
  let list=[...matches].sort((a,b)=>a.utcDate.localeCompare(b.utcDate));
  if(gFilter!=='ALL'){
    const ts=GROUPS_STATIC[gFilter]||[];
    list=list.filter(m=>ts.includes(norm(m.homeTeam.name))||ts.includes(norm(m.awayTeam.name)));
  }
  el.innerHTML=filters+`<div style="font-size:11px;color:#4a6080;margin:0 0 8px">${list.length} spēles</div>`+list.map(m=>mCard(m)).join('');
}
function setGF(g){gFilter=g;renderSchedule();}

function renderStandings(){
  const el=document.getElementById('tab-standings');
  if(Object.keys(standingsData).length){
    let html='<div style="padding-top:10px">';
    for(const [letter,table] of Object.entries(standingsData)){
      const color=GC[letter]||'#888';
      html+=`<div class="sg"><div class="sh">
        <div class="gbadge" style="background:${color};min-width:22px;height:22px;border-radius:4px">${letter}</div>
        <div style="font-size:11px;font-weight:900;letter-spacing:2px;color:${color}">GRUPA ${letter}</div>
      </div>
      <table class="stbl"><thead><tr><th>Komanda</th><th>S</th><th>U</th><th>N</th><th>Z</th><th>GF:GA</th><th>Pts</th></tr></thead>
      <tbody>${table.map((t,i)=>`<tr class="${i<2?'q':i===2?'m':''}" onclick="openTeam('${norm(t.team.name)}')">
        <td><span class="pnum">${i+1}</span>${FLAGS[norm(t.team.name)]||'🌍'} ${norm(t.team.name)}</td>
        <td>${t.playedGames}</td><td>${t.won}</td><td>${t.draw}</td><td>${t.lost}</td>
        <td>${t.goalsFor}:${t.goalsAgainst}</td>
        <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${t.points}</strong></td>
      </tr>`).join('')}
      </tbody></table></div>`;
    }
    html+='</div><div class="ibox"><strong>Krāsas:</strong> 🟢 Kvalificējas · 🟡 Iespējams · Spiedi uz komandu → profils</div>';
    el.innerHTML=html;
  } else {
    el.innerHTML='<div class="loader">⏳ Tabulas dati ielādējas...</div>';
  }
}

function renderGroups(){
  const el=document.getElementById('tab-groups');
  let html='<div class="gg">';
  for(const [g,teams] of Object.entries(GROUPS_STATIC)){
    html+=`<div class="gb" style="border-left:3px solid ${GC[g]}">
      <div class="gt" style="color:${GC[g]}">GRUPA ${g}</div>
      ${teams.map(t=>`<div class="tr" onclick="openTeam('${t}')">
        <span style="font-size:14px">${FLAGS[t]||'🌍'}</span>
        <span style="font-size:12px;color:#ddeeff;flex:1">${t}</span>
        <span style="font-size:10px;color:#4a6080">›</span>
      </div>`).join('')}
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function mCard(m){
  const h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
  const hf=FLAGS[h]||'🌍', af=FLAGS[a]||'🌍';
  const sc=m.score?.fullTime||m.score?.halfTime;
  const s1=sc?.home, s2=sc?.away;
  const hasScore=s1!==null&&s1!==undefined&&m.status!=='TIMED'&&m.status!=='SCHEDULED';
  const h1w=hasScore&&s1>s2, h2w=hasScore&&s2>s1;
  const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';

  let grp='KO',color='#c8a84b';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(h)||ts.includes(a)){grp=g;color=GC[g];break;}}

  let badge='';
  if(isLive) badge=`<span class="sbadge sb-live">🔴 LIVE ${m.minute||''}${m.minute?"'":''}  </span>`;
  else if(m.status==='PAUSED') badge='<span class="sbadge" style="background:#e67e22;color:#fff">HT</span>';
  else if(m.status==='FINISHED') badge=`<span class="sbadge sb-ft">FT</span>`;
  else{
    const dt=new Date(m.utcDate);
    badge=`<span class="sbadge sb-sched">${dt.toLocaleTimeString('lv-LV',{hour:'2-digit',minute:'2-digit'})}</span>`;
  }

  const dateStr=new Date(m.utcDate).toLocaleDateString('lv-LV',{day:'2-digit',month:'short'});
  const gl=grp==='KO'?`<div style="font-size:9px;color:${color};font-weight:800;min-width:24px;flex-shrink:0">KO</div>`
    :`<div class="gbadge" style="background:${color}">${grp}</div>`;

  // Goals
  let goalsHTML='';
  if(hasScore&&m.goals&&m.goals.length){
    const hg=m.goals.filter(g=>g.team?.id===m.homeTeam.id).map(g=>`${g.scorer?.name||'?'} ${g.minute}'`).join(', ');
    const ag=m.goals.filter(g=>g.team?.id===m.awayTeam.id).map(g=>`${g.scorer?.name||'?'} ${g.minute}'`).join(', ');
    if(hg) goalsHTML+=`<div class="scorers">⚽ ${h}: ${hg}</div>`;
    if(ag) goalsHTML+=`<div class="scorers">⚽ ${a}: ${ag}</div>`;
  }

  return`<div class="mc${isLive?' is-live':''}" style="border-left-color:${color}">
    <div class="mc-top">${gl}
      <div class="tblock">
        <div class="tline">
          <span class="tflag">${hf}</span>
          <span class="tname" style="font-weight:${h1w?900:700}" onclick="openTeam('${h}')">${h}</span>
          ${hasScore?`<span class="tscore ${h1w?'win':'draw'}">${s1}</span>`:'<span class="vsb">–</span>'}
        </div>
        <div class="tline">
          <span class="tflag">${af}</span>
          <span class="tname" style="font-weight:${h2w?900:700}" onclick="openTeam('${a}')">${a}</span>
          ${hasScore?`<span class="tscore ${h2w?'win':'draw'}">${s2}</span>`:'<span class="vsb">–</span>'}
        </div>
      </div>
    </div>
    ${goalsHTML}
    <div class="mc-bot">
      <span class="vtxt">📍 ${m.venue||''}</span>
      <div style="display:flex;align-items:center;gap:6px">${badge}<span class="dtxt">${dateStr}</span></div>
    </div>
  </div>`;
}

function openTeam(name){
  let grp='?';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(name)){grp=g;break;}}
  const color=GC[grp]||'#888';
  document.getElementById('mname').textContent=name;
  document.getElementById('mflag').textContent=FLAGS[name]||'🌍';
  document.getElementById('msub').textContent=`Grupa ${grp} · FIFA Pasaules kauss 2026`;
  let body='';

  // Standings from API
  const grpTable=standingsData[grp];
  if(grpTable&&grpTable.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">📊 Grupas tabula</div>
    <table class="mini-st"><thead><tr><th>Komanda</th><th>S</th><th>U</th><th>N</th><th>Z</th><th>GF:GA</th><th>Pts</th></tr></thead>
    <tbody>${grpTable.map((t,i)=>`<tr class="${norm(t.team.name)===name?'hl':''}">
      <td><span class="pnum">${i+1}</span>${FLAGS[norm(t.team.name)]||'🌍'} ${norm(t.team.name)}</td>
      <td>${t.playedGames}</td><td>${t.won}</td><td>${t.draw}</td><td>${t.lost}</td>
      <td>${t.goalsFor}:${t.goalsAgainst}</td>
      <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${t.points}</strong></td>
    </tr>`).join('')}</tbody></table></div>`;
  }

  // Team matches
  const tm=matches.filter(m=>norm(m.homeTeam.name)===name||norm(m.awayTeam.name)===name)
    .sort((a,b)=>a.utcDate.localeCompare(b.utcDate));
  if(tm.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">⚽ Spēles</div>`;
    body+=tm.map(m=>{
      const isH=norm(m.homeTeam.name)===name;
      const opp=isH?norm(m.awayTeam.name):norm(m.homeTeam.name);
      const sc=m.score?.fullTime;
      const myS=isH?sc?.home:sc?.away, oppS=isH?sc?.away:sc?.home;
      const hasS=myS!==null&&myS!==undefined&&m.status==='FINISHED';
      let res='';
      if(hasS){
        if(myS>oppS) res='<span style="color:#27ae60;font-weight:800;font-size:10px;margin-left:4px">U</span>';
        else if(myS<oppS) res='<span style="color:#e63946;font-weight:800;font-size:10px;margin-left:4px">Z</span>';
        else res='<span style="color:#f39c12;font-weight:800;font-size:10px;margin-left:4px">N</span>';
      }
      const dt=new Date(m.utcDate).toLocaleDateString('lv-LV',{day:'2-digit',month:'short'});
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      return`<div class="mmatch" style="border-left-color:${color}${isLive?';background:#091f14':''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span>${FLAGS[name]||'🌍'}</span><span style="font-size:12px;font-weight:700;flex:1">${name}</span>
          ${hasS?`<span style="font-size:15px;font-weight:900;color:#c8a84b">${myS}:${oppS}</span>`:'<span style="font-size:11px;color:#5a7fa8">vs</span>'}
          <span style="font-size:12px;font-weight:700">${opp}</span><span>${FLAGS[opp]||'🌍'}</span>
        </div>
        <div style="font-size:10px;color:#5a7fa8">${dt}${hasS?' · FT'+res:isLive?' · 🔴 LIVE':''}</div>
      </div>`;
    }).join('');
    body+='</div>';
  }

  const squad=SQUADS[name];
  if(squad){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">👕 Spēlētāji</div>
    <div class="pgrid">${squad.map(p=>`<div class="pc"><div class="ppos">${p.pos}</div><div class="pname">${p.name}</div><div class="pclub">${p.club}</div></div>`).join('')}</div></div>`;
  }

  document.getElementById('mbody').innerHTML=body;
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function closeMod(){
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow='';
}

loadAll();
</script>
</body>
</html>
