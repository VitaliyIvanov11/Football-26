<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a14;color:#eaeaea;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(135deg,#0a1628 0%,#1a2d55 50%,#0a1628 100%);border-bottom:2px solid #c8a84b;padding:16px 16px 12px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:4px;color:#c8a84b;text-transform:uppercase;margin-bottom:4px}
h1{font-size:22px;font-weight:900;color:#fff}
.hinfo{margin-top:4px;font-size:11px;color:#8fa3c8}
.lang-bar{display:flex;justify-content:center;gap:6px;padding:8px 16px;background:#0d1520;border-bottom:1px solid #1a2535}
.lang-btn{padding:4px 12px;border-radius:16px;border:1px solid #2a3a5a;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:#6a8ab0;transition:all .15s}
.lang-btn.active{background:#c8a84b;color:#0a0a14;border-color:#c8a84b}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;background:#0d1520;border-bottom:1px solid #1a2535;font-size:11px}
.sdot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:6px}
.sdot.live{background:#27ae60;animation:pulse 1.5s infinite}
.sdot.error{background:#e63946}
.sdot.loading{background:#f39c12;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{color:#6a8ab0}
.rbtn{background:#1a2d55;border:1px solid #2a3a5a;border-radius:6px;padding:4px 10px;color:#8fa3c8;font-size:11px;cursor:pointer}
.tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:8px 12px;background:#0d1520;border-bottom:1px solid #1a2535}
.tab{padding:8px 2px;font-size:10px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;border:none;cursor:pointer;background:#10192a;color:#6a8ab0;border-radius:8px;text-align:center;line-height:1.3}
.tab.active{background:#c8a84b;color:#0a0a14}
.content{padding:0 16px 80px}
.sec-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:12px 0 6px}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 8px}
.fbtn{padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#1a2235;color:#8fa3c8}
.fbtn.active{color:#fff}
.loader{text-align:center;padding:40px 16px;color:#4a6080;font-size:13px;line-height:2}
.hidden{display:none}
.mc{background:#10192a;border-radius:10px;margin-bottom:8px;padding:11px 13px;border-left:3px solid #2a3a5a}
.mc.is-live{background:#091f14}
.mc-top{display:flex;align-items:center;gap:8px}
.gbadge{min-width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.tblock{flex:1;min-width:0}
.tline{display:flex;align-items:center;gap:6px;padding:2px 0}
.tflag{font-size:15px;flex-shrink:0}
.tname{font-size:13px;font-weight:700;color:#ddeeff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline dotted #3a5a8a}
.tscore{font-size:20px;font-weight:900;min-width:26px;text-align:right}
.tscore.win{color:#c8a84b}
.tscore.draw{color:#eaeaea}
.vsb{font-size:10px;color:#4a6080;min-width:26px;text-align:right}
.mc-bot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.vtxt{font-size:10px;color:#5a7fa8}
.dtxt{font-size:11px;font-weight:800;color:#c8a84b}
.time-block{text-align:right}
.time-riga{font-size:12px;font-weight:800;color:#c8a84b}
.time-utc{font-size:10px;color:#4a6080}
.sbadge{font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.sb-live{background:#27ae60;color:#fff;animation:pulse 1s infinite}
.sb-ft{background:#2a3a5a;color:#8fa3c8}
.sb-sched{background:#1a2235;color:#5a7fa8}
.scorers{font-size:10px;color:#7fa8c8;padding:3px 0 0 32px;line-height:1.7}
.stbl{width:100%;border-collapse:collapse;background:#10192a;border-radius:8px;overflow:hidden;margin-bottom:10px}
.stbl th{font-size:9px;color:#4a6080;text-align:center;padding:6px 3px;text-transform:uppercase}
.stbl th:first-child{text-align:left;padding-left:10px}
.stbl td{font-size:11px;text-align:center;padding:7px 3px;border-top:1px solid #111c2a;cursor:pointer}
.stbl td:first-child{text-align:left;padding-left:10px}
.stbl tr:active td{background:#1a2535}
.stbl tr.q td{background:#0d1f12}
.stbl tr.m td{background:#1a1508}
.pnum{color:#6a8ab0;font-size:10px;margin-right:4px}
.sg{background:#10192a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sh{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #1a2535}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px}
.gb{background:#10192a;border-radius:10px;padding:11px 13px}
.gt{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.tr{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #1e2a3a;cursor:pointer}
.tr:last-child{border-bottom:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;flex-direction:column;overflow:hidden}
.modal.hidden{display:none}
.mhdr{background:linear-gradient(135deg,#0a1628,#1a2d55);padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #c8a84b;flex-shrink:0}
.mback{background:#1a2d55;border:1px solid #2a3a5a;border-radius:8px;padding:6px 12px;color:#8fa3c8;font-size:12px;cursor:pointer}
.mbody{flex:1;overflow-y:auto;padding:14px 16px 40px}
.msec{margin-bottom:18px}
.mstitle{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #1e2a45}
.mini-st{width:100%;border-collapse:collapse;background:#10192a;border-radius:8px;overflow:hidden}
.mini-st th{font-size:9px;color:#4a6080;text-align:center;padding:6px 3px;text-transform:uppercase}
.mini-st th:first-child{text-align:left;padding-left:10px}
.mini-st td{font-size:12px;text-align:center;padding:7px 3px;border-top:1px solid #111c2a}
.mini-st td:first-child{text-align:left;padding-left:10px}
.mini-st tr.hl td{background:#1a2a3a;font-weight:700}
.mmatch{background:#10192a;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #2a3a5a}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pc{background:#10192a;border-radius:8px;padding:8px 10px}
.ppos{font-size:9px;color:#c8a84b;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.pname{font-size:12px;color:#ddeeff;margin-top:2px;font-weight:600}
.pclub{font-size:10px;color:#5a7fa8}
.ibox{margin-top:12px;padding:10px;background:#0e1520;border-radius:8px;font-size:11px;color:#6a8ab0;line-height:1.7}
.ibox strong{color:#c8a84b}
/* Charts */
.stats-wrap{padding-top:14px}
.chart-card{background:#10192a;border-radius:10px;margin-bottom:14px;padding:14px}
.chart-title{font-size:12px;font-weight:800;letter-spacing:1px;color:#c8a84b;text-transform:uppercase;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:#ddeeff;min-width:90px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#0d1520;border-radius:4px;height:20px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-val{font-size:10px;font-weight:800;color:#fff}
.scorer-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #111c2a}
.scorer-row:last-child{border-bottom:none}
.scorer-pos{font-size:11px;color:#4a6080;min-width:20px;text-align:center}
.scorer-flag{font-size:14px}
.scorer-name{font-size:12px;font-weight:700;color:#ddeeff;flex:1}
.scorer-team{font-size:10px;color:#5a7fa8}
.scorer-goals{font-size:16px;font-weight:900;color:#c8a84b;min-width:30px;text-align:right}
.form-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.form-name{font-size:11px;color:#ddeeff;min-width:88px;text-align:right;flex-shrink:0}
.form-dots{display:flex;gap:3px}
.form-dot{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.fd-w{background:#27ae60}
.fd-d{background:#f39c12}
.fd-l{background:#e63946}
.fd-n{background:#1a2235;color:#4a6080}
/* Info tab */
.info-wrap{padding-top:14px}
.info-section{margin-bottom:14px}
.info-sec-title{font-size:12px;font-weight:800;letter-spacing:1px;color:#c8a84b;text-transform:uppercase;margin-bottom:10px}
.news-card{background:#10192a;border-radius:10px;margin-bottom:8px;padding:12px 14px;border-left:3px solid #c8a84b;cursor:pointer}
.news-card:active{background:#1a2535}
.news-title{font-size:13px;font-weight:700;color:#ddeeff;margin-bottom:4px;line-height:1.4}
.news-meta{font-size:10px;color:#5a7fa8}
.news-body{font-size:12px;color:#8fa3c8;margin-top:6px;line-height:1.6;display:none}
.news-card.open .news-body{display:block}
.stadium-card{background:#10192a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.stadium-img{width:100%;height:120px;object-fit:cover;background:linear-gradient(135deg,#0a1628,#1a2d55);display:flex;align-items:center;justify-content:center;font-size:40px}
.stadium-info{padding:10px 13px}
.stadium-name{font-size:13px;font-weight:800;color:#ddeeff}
.stadium-city{font-size:11px;color:#5a7fa8;margin-top:2px}
.stadium-cap{font-size:11px;color:#c8a84b;margin-top:3px;font-weight:700}
.ballon-card{background:#10192a;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ballon-pos{font-size:18px;font-weight:900;color:#c8a84b;min-width:28px;text-align:center}
.ballon-info{flex:1}
.ballon-name{font-size:13px;font-weight:800;color:#ddeeff}
.ballon-team{font-size:11px;color:#5a7fa8}
.ballon-stats{font-size:11px;color:#8fa3c8;margin-top:2px}
.ballon-odds{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;background:#1a2d55;color:#8fa3c8}
.info-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.itab{padding:6px 12px;border-radius:16px;border:1px solid #2a3a5a;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#6a8ab0}
.itab.active{background:#c8a84b;color:#0a0a14;border-color:#c8a84b}
.form-pts{font-size:11px;font-weight:800;color:#c8a84b;min-width:28px;text-align:right}
.no-stats{text-align:center;padding:30px;color:#4a6080;font-size:12px;line-height:2}
/* Search */
.search-box{padding:10px 16px 0}
.search-box input{width:100%;background:#10192a;border:1px solid #2a3a5a;border-radius:10px;padding:10px 14px;color:#eaeaea;font-size:14px;outline:none}
.search-box input:focus{border-color:#c8a84b}
/* Favorite */
.fav-star{cursor:pointer;font-size:16px;flex-shrink:0;opacity:.4;transition:opacity .2s}
.fav-star.on{opacity:1}
.fav-banner{background:linear-gradient(135deg,#1a2d55,#0a1628);border:1px solid #c8a84b;border-radius:10px;padding:10px 13px;margin:12px 0 8px;display:flex;align-items:center;gap:10px}
.fav-banner-flag{font-size:24px}
.fav-banner-info{flex:1}
.fav-banner-name{font-size:14px;font-weight:800;color:#c8a84b}
.fav-banner-sub{font-size:11px;color:#8fa3c8;margin-top:2px}
/* Share */
.share-btn{background:#1a2d55;border:1px solid #2a3a5a;border-radius:6px;padding:5px 10px;color:#8fa3c8;font-size:11px;cursor:pointer;flex-shrink:0;margin-right:6px}
.share-row{display:flex;gap:6px;margin-bottom:6px}
/* Calendar btn */
.cal-btn{font-size:9px;color:#5a7fa8;background:#1a2235;border:none;padding:3px 7px;border-radius:5px;cursor:pointer;margin-top:4px}
.cal-btn:active{background:#2a3a5a}

<header>
  <div class="eyebrow">FIFA</div>
  <h1>World Cup 2026 🏆</h1>
  <div class="hinfo">11.06 – 19.07 · 🇺🇸🇨🇦🇲🇽 · 104 <span data-t="matches">spēles</span></div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('lv')">🇱🇻 LV</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
  <button class="lang-btn" onclick="setLang('es')">🇪🇸 ES</button>
</div>

<div class="sbar">
  <div style="display:flex;align-items:center;gap:6px;min-width:0">
    <span class="sdot" id="sdot"></span>
    <span class="stxt" id="stxt">...</span>
    <span id="tzlabel" style="font-size:10px;color:#2a5080;background:#0a1628;padding:2px 7px;border-radius:10px;flex-shrink:0"></span>
  </div>
  <div style="display:flex;gap:6px">
    <button class="rbtn" onclick="shareApp()">🔗</button>
    <button class="rbtn" onclick="loadAll()" data-t="refresh">↻</button>
  </div>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Meklēt komandu..." oninput="onSearch()">
</div>

<div class="tabs">
  <button class="tab active" onclick="sw('today')" data-t="tab_today">🏠<br>Šodien</button>
  <button class="tab" onclick="sw('results')" data-t="tab_results">✅<br>Rezult.</button>
  <button class="tab" onclick="sw('schedule')" data-t="tab_schedule">📅<br>Grafiks</button>
  <button class="tab" onclick="sw('standings')" data-t="tab_standings">🏆<br>Tabula</button>
  <button class="tab" onclick="sw('groups')" data-t="tab_groups">🌍<br>Grupas</button>
  <button class="tab" onclick="sw('stats')" data-t="tab_stats">📈<br>Stats</button>
  <button class="tab" onclick="sw('info')">ℹ️<br>Info</button>
</div>

<div class="content">
  <div id="tab-today"><div class="loader">⏳ <span data-t="loading">Ielādē...</span></div></div>
  <div id="tab-results" class="hidden"></div>
  <div id="tab-schedule" class="hidden"></div>
  <div id="tab-standings" class="hidden"></div>
  <div id="tab-groups" class="hidden"></div>
  <div id="tab-stats" class="hidden"></div>
  <div id="tab-info" class="hidden"></div>
</div>

<div class="modal hidden" id="modal">
  <div class="mhdr">
    <button class="mback" onclick="closeMod()">← <span data-t="back">Atpakaļ</span></button>
    <div style="flex:1">
      <div style="font-size:20px;font-weight:900;color:#fff" id="mname"></div>
      <div style="font-size:11px;color:#8fa3c8;margin-top:2px" id="msub"></div>
    </div>
    <div style="font-size:36px" id="mflag"></div>
  </div>
  <div class="mbody" id="mbody"></div>
</div>

<div class="modal hidden" id="matchModal">
  <div class="mhdr">
    <button class="mback" onclick="closeMatch()">← <span data-t="back">Atpakaļ</span></button>
    <div style="flex:1">
      <div style="font-size:16px;font-weight:900;color:#fff" id="mmTitle"></div>
      <div style="font-size:11px;color:#8fa3c8;margin-top:2px" id="mmSub"></div>
    </div>
  </div>
  <div class="mbody" id="mmBody"></div>
</div>

// Auto-detect user timezone
const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const USER_TZ_LABEL = USER_TZ.split('/').pop().replace(/_/g,' ');
// Set timezone label
document.addEventListener('DOMContentLoaded',function(){
  var el=document.getElementById('tzlabel');
  if(el) el.textContent='🕐 '+USER_TZ_LABEL;
});

function formatTimes(utcDateStr){
  const dt=new Date(utcDateStr);
  const local=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:USER_TZ});
  const utc=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:'UTC'});
  const date=dt.toLocaleDateString([],{day:'2-digit',month:'short',timeZone:USER_TZ});
  return{riga:local,utc,date};
}

async function apiFetch(path){
  const r=await fetch(BASE+path);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadAll(){
  setSt('loading',t('loading'));
  try{
    const mData=await apiFetch('/competitions/WC/matches');
    matches=mData.matches||[];
    try{
      const sData=await apiFetch('/competitions/WC/standings');
      standingsData={};
      for(const sg of (sData.standings||[])){
        const letter=sg.group?sg.group.replace('GROUP_','').replace('Group ','').slice(-1):'?';
        standingsData[letter]=sg.table||[];
      }
    }catch(e2){standingsData={};}
    const played=matches.filter(m=>m.status==='FINISHED').length;
  setSt('live',`✅ ${played} ${t('played')} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`);
  }catch(e){
    setSt('error',t('error')+': '+e.message);
  }
  renderTab();
  clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    if(matches.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED')) loadAll();
  },30000);
}

function renderToday(){
  const el=document.getElementById('tab-today');

  let html='';

  // Favorite team banner
  const fav=getFav();
  if(fav){
    let grp='?';

    const favMatches=matches.filter(m=>norm(m.homeTeam.name)===fav||norm(m.awayTeam.name)===fav);
    const nextFav=favMatches.filter(m=>m.status==='TIMED'||m.status==='SCHEDULED').sort((a,b)=>a.utcDate.localeCompare(b.utcDate))[0];
    let subText='';
    if(nextFav){

    html+=`<div class="fav-banner" onclick="openTeam('${fav}')">

      </div>
      <span style="font-size:10px;color:#5a7fa8">›</span>
    </div>`;
  }

  const todayFT=matches.filter(m=>m.utcDate.slice(0,10)===td&&m.status==='FINISHED'&&matchesSearch(m));
  const todayNS=matches.filter(m=>m.utcDate.slice(0,10)===td&&(m.status==='TIMED'||m.status==='SCHEDULED')&&matchesSearch(m));
  if(live.length){html+=`<div class="sec-title" style="color:#27ae60">${t('sec_live')} — ${live.length}</div>`+live.map(m=>mCard(m)).join('');}
  if(todayFT.length){html+=`<div class="sec-title" style="color:#c8a84b">${t('sec_today')}</div>`+todayFT.map(m=>mCard(m)).join('');}
  if(todayNS.length){html+=`<div class="sec-title" style="color:#2980b9">${t('sec_upcoming')}</div>`+todayNS.map(m=>mCard(m)).join('');}
  if(!html||(!live.length&&!todayFT.length&&!todayNS.length)){
    const next=matches.filter(m=>(m.status==='TIMED'||m.status==='SCHEDULED')&&matchesSearch(m)).sort((a,b)=>a.utcDate.localeCompare(b.utcDate)).slice(0,8);

  }
  el.innerHTML=html;
}

function mCard(m){
  const h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
  const hf=FLAGS[h]||'🌍', af=FLAGS[a]||'🌍';
  const sc=m.score?.fullTime||m.score?.halfTime||{};
  const s1=sc.home??null, s2=sc.away??null;
  const hasScore=s1!==null&&s2!==null&&m.status!=='TIMED'&&m.status!=='SCHEDULED'&&m.status!=='NS';
  const h1w=hasScore&&s1>s2, h2w=hasScore&&s2>s1;
  const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  const {riga,utc,date}=formatTimes(m.utcDate);

  let grp='KO',color='#c8a84b';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(h)||ts.includes(a)){grp=g;color=GC[g];break;}}

  let badge='';
  if(isLive) badge=`<span class="sbadge sb-live">🔴 ${m.status==='PAUSED'?'HT':((m.minute||0)+"'")} </span>`;
  else if(m.status==='FINISHED') badge=`<span class="sbadge sb-ft">FT</span>`;
  else badge=`<span class="sbadge sb-sched">${riga}</span>`;

  const venueName=tVenue(m.venue||'');

    :`<div class="gbadge" style="background:${color}">${grp}</div>`;

  let goalsHTML='';
  if(hasScore&&m.goals&&m.goals.length){
    const hg=m.goals.filter(g=>g.team?.id===m.homeTeam.id).map(g=>`${g.scorer?.name||'?'} ${g.minute}'`).join(', ');
    const ag=m.goals.filter(g=>g.team?.id===m.awayTeam.id).map(g=>`${g.scorer?.name||'?'} ${g.minute}'`).join(', ');
    if(hg) goalsHTML+=`<div class="scorers">⚽ ${tTeam(h)}: ${hg}</div>`;
    if(ag) goalsHTML+=`<div class="scorers">⚽ ${tTeam(a)}: ${ag}</div>`;
  }

  return`<div class="mc${isLive?' is-live':''}" style="border-left-color:${color}">
    <div class="mc-top">${gl}
      <div class="tblock">

function openTeam(name){
  let grp='?';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(name)){grp=g;break;}}
  const color=GC[grp]||'#888';
  const isFav=getFav()===name;
  document.getElementById('mname').innerHTML=`${tTeam(name)} <span style="cursor:pointer;font-size:18px" onclick="setFav('${name}');closeMod();openTeam('${name}')">${isFav?'⭐':'☆'}</span>`;
  document.getElementById('mflag').textContent=FLAGS[name]||'🌍';
  document.getElementById('msub').textContent=`${t('group')} ${grp} · FIFA World Cup 2026`;
  let body='';

  // Standings
  const grpTable=standingsData[grp];
  if(grpTable&&grpTable.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">📊 ${t('stand_title')}</div>
    <table class="mini-st"><thead><tr>
      <th>${t('col_team')}</th><th>${t('col_p')}</th><th>${t('col_w')}</th><th>${t('col_d')}</th><th>${t('col_l')}</th><th>GF:GA</th><th>${t('col_pts')}</th>
    </tr></thead><tbody>
    ${grpTable.map((tb,i)=>`<tr class="${norm(tb.team.name)===name?'hl':''}">
      <td><span class="pnum">${i+1}</span>${FLAGS[norm(tb.team.name)]||'🌍'} ${tTeam(norm(tb.team.name))}</td>
      <td>${tb.playedGames}</td><td>${tb.won}</td><td>${tb.draw}</td><td>${tb.lost}</td>
      <td>${tb.goalsFor}:${tb.goalsAgainst}</td>
      <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${tb.points}</strong></td>
    </tr>`).join('')}</tbody></table></div>`;
  }

  // Matches
  const tm=matches.filter(m=>norm(m.homeTeam.name)===name||norm(m.awayTeam.name)===name).sort((a,b)=>a.utcDate.localeCompare(b.utcDate));
  if(tm.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">⚽ ${t('matches_title')}</div>`;
    body+=tm.map(m=>{
      const isH=norm(m.homeTeam.name)===name;
      const opp=isH?norm(m.awayTeam.name):norm(m.homeTeam.name);
      const sc=m.score?.fullTime||m.score?.halfTime||{};
      const myS=isH?(sc.home??null):(sc.away??null), oppS=isH?(sc.away??null):(sc.home??null);
      const hasS=myS!==null&&oppS!==null&&m.status==='FINISHED';
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      const {riga,date}=formatTimes(m.utcDate);
      let res='';
      if(hasS){
        if(myS>oppS) res='<span style="color:#27ae60;font-weight:800;font-size:10px;margin-left:4px">✓</span>';
        else if(myS<oppS) res='<span style="color:#e63946;font-weight:800;font-size:10px;margin-left:4px">✗</span>';
        else res='<span style="color:#f39c12;font-weight:800;font-size:10px;margin-left:4px">=</span>';
      }
      return`<div class="mmatch" style="border-left-color:${color}${isLive?';background:#091f14':''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span>${FLAGS[name]||'🌍'}</span>
          <span style="font-size:12px;font-weight:700;flex:1">${tTeam(name)}</span>
          ${hasS?`<span style="font-size:15px;font-weight:900;color:#c8a84b">${myS}:${oppS}</span>`:'<span style="font-size:11px;color:#5a7fa8">vs</span>'}
          <span style="font-size:12px;font-weight:700">${tTeam(opp)}</span>
          <span>${FLAGS[opp]||'🌍'}</span>
        </div>
        <div style="font-size:10px;color:#5a7fa8">${date} ${riga}${hasS?' · FT'+res:isLive?' · 🔴 LIVE':''}</div>
      </div>`;
    }).join('');
    body+='</div>';
  }

  const squad=SQUADS[name];
  body+=`<div class="msec"><div class="mstitle" style="color:${color}">👕 ${t('squad_title')}</div>`;
  if(squad){
    body+=`<div class="pgrid">${squad.map(p=>`<div class="pc"><div class="ppos">${p.pos}</div><div class="pname">${p.name}</div><div class="pclub">${p.club}</div></div>`).join('')}</div>`;
  } else {
    body+=`<div style="text-align:center;padding:20px;color:#4a6080;font-size:12px">${t('no_squad')}</div>`;
  }
  body+='</div>';

  document.getElementById('mbody').innerHTML=body;
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function closeMod(){
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow='';
}

function renderBrackets(){
  // Knockout matches from API (stage != GROUP_STAGE)
  var koMatches=matches.filter(function(m){
    return m.stage&&m.stage!=="GROUP_STAGE"&&m.stage!=="REGULAR_SEASON";
  });
  var title=lang==="lv"?"Izslēgšanas kārta":lang==="es"?"Eliminatorias":"Knockout stage";
  var soon=lang==="lv"?"Sākas pēc grupu kārtas (28. jūnijā)":lang==="es"?"Comienza tras la fase de grupos (28 jun)":"Starts after group stage (June 28)";

  var html='<div style="margin-top:20px"><div class="chart-title" style="color:#c8a84b;margin-bottom:12px">🏆 '+title+'</div>';

  if(!koMatches.length){
    html+='<div style="background:#10192a;border-radius:10px;padding:24px;text-align:center;color:#5a7fa8;font-size:12px">⏳ '+soon+'</div>';
    // Show bracket structure preview
    var rounds=lang==="lv"?["1/16","1/8","1/4","1/2","Fināls"]:lang==="es"?["16avos","Octavos","Cuartos","Semis","Final"]:["R32","R16","QF","SF","Final"];
    html+='<div style="display:flex;justify-content:space-between;margin-top:14px;padding:0 4px">';
    for(var i=0;i<rounds.length;i++){
      html+='<div style="text-align:center;flex:1"><div style="font-size:10px;color:#c8a84b;font-weight:800">'+rounds[i]+'</div><div style="font-size:9px;color:#4a6080;margin-top:3px">'+(i===4?"🏆":"")+'</div></div>';
    }
    html+='</div>';
  } else {
    // Group by stage
    var stages={};
    var stageOrder=["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","THIRD_PLACE","FINAL"];
    var stageNames={lv:{LAST_32:"1/16 fināls",LAST_16:"1/8 fināls",QUARTER_FINALS:"Ceturtdaļfināls",SEMI_FINALS:"Pusfināls",THIRD_PLACE:"Bronzas spēle",FINAL:"FINĀLS"},
      en:{LAST_32:"Round of 32",LAST_16:"Round of 16",QUARTER_FINALS:"Quarter-finals",SEMI_FINALS:"Semi-finals",THIRD_PLACE:"Third place",FINAL:"FINAL"},
      es:{LAST_32:"16avos",LAST_16:"Octavos",QUARTER_FINALS:"Cuartos",SEMI_FINALS:"Semifinales",THIRD_PLACE:"Tercer puesto",FINAL:"FINAL"}};
    for(var i=0;i<koMatches.length;i++){
      var st=koMatches[i].stage;
      if(!stages[st]) stages[st]=[];
      stages[st].push(koMatches[i]);
    }
    var sn=stageNames[lang]||stageNames.en;
    for(var s=0;s<stageOrder.length;s++){
      var st=stageOrder[s];
      if(!stages[st]) continue;
      html+='<div style="font-size:11px;font-weight:800;color:#c8a84b;margin:10px 0 6px;letter-spacing:1px">'+(sn[st]||st)+'</div>';
      for(var i=0;i<stages[st].length;i++){
        html+=mCard(stages[st][i]);
      }
    }
  }
  html+='</div>';
  return html;
}


function renderStats(){
  var el=document.getElementById("tab-stats");
  var finished=matches.filter(function(m){return m.status==="FINISHED";});
  if(!finished.length){
    el.innerHTML="<div class=\"no-stats\">📊 "+t("no_results")+"<br><br><small style=\"color:#4a6080\">"+t("tournament_starts")+"</small></div>";
    return;
  }
  var html="<div class=\"stats-wrap\">";

  // 1. Goals per group
  var groupGoals={};
  for(var i=0;i<finished.length;i++){
    var m=finished[i];
    var h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
    var sc=m.score&&m.score.fullTime?m.score.fullTime:{};
    var g=(sc.home||0)+(sc.away||0);
    var grp="?";
    var gkeys=Object.keys(GROUPS_STATIC);
    for(var gi=0;gi<gkeys.length;gi++){
      var gk=gkeys[gi];
      if(GROUPS_STATIC[gk].indexOf(h)>=0||GROUPS_STATIC[gk].indexOf(a)>=0){grp=gk;break;}
    }
    if(!groupGoals[grp]) groupGoals[grp]={goals:0,matches:0};
    groupGoals[grp].goals+=g;
    groupGoals[grp].matches++;
  }
  var maxG=1;
  var grpKeys=Object.keys(groupGoals);
  for(var i=0;i<grpKeys.length;i++){if(groupGoals[grpKeys[i]].goals>maxG) maxG=groupGoals[grpKeys[i]].goals;}
  var totalGoals=0;
  for(var i=0;i<grpKeys.length;i++) totalGoals+=groupGoals[grpKeys[i]].goals;
  var avgGoals=(totalGoals/finished.length).toFixed(1);
  var totalLabel=lang==="lv"?"Kopā":lang==="es"?"Total":"Total";
  var avgLabel=lang==="lv"?"Vidēji":lang==="es"?"Media":"Avg";
  html+="<div class=\"chart-card\">";
  html+="<div class=\"chart-title\">⚽ "+(lang==="lv"?"Vārti pa grupām":lang==="es"?"Goles por grupo":"Goals by group")+"</div>";
  html+="<div style=\"font-size:10px;color:#5a7fa8;margin-bottom:10px\">"+totalLabel+": "+totalGoals+" · "+avgLabel+": "+avgGoals+"/sp.</div>";
  var sortedGrps=grpKeys.sort(function(a,b){return groupGoals[b].goals-groupGoals[a].goals;});
  for(var i=0;i<sortedGrps.length;i++){
    var grp=sortedGrps[i];
    var d=groupGoals[grp];
    var color=GC[grp]||"#888";
    var pct=Math.round((d.goals/maxG)*100);
    var avg=(d.goals/d.matches).toFixed(1);
    html+="<div class=\"bar-row\">";
    html+="<div class=\"bar-label\"><span style=\"color:"+color+";font-weight:800\">"+t("group")+" "+grp+"</span></div>";
    html+="<div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:"+pct+"%;background:"+color+"\"><span class=\"bar-val\">"+d.goals+"</span></div></div>";
    html+="<div style=\"font-size:10px;color:#5a7fa8;min-width:36px\">"+avg+"/sp.</div></div>";
  }
  html+="</div>";

  // 2. Top scorers
  var scorers={};
  for(var i=0;i<finished.length;i++){
    var m=finished[i];
    if(!m.goals) continue;
    for(var j=0;j<m.goals.length;j++){
      var g=m.goals[j];
      if(!g.scorer||!g.scorer.name) continue;
      var key=g.scorer.name;
      var team=norm(g.team&&g.team.name?g.team.name:"");
      if(!scorers[key]) scorers[key]={name:key,team:team,goals:0};
      scorers[key].goals++;
    }
  }
  var top=Object.values(scorers).sort(function(a,b){return b.goals-a.goals;}).slice(0,10);
  if(top.length){
    var glabel=lang==="lv"?"vārti":lang==="es"?"goles":"goals";
    html+="<div class=\"chart-card\">";
    html+="<div class=\"chart-title\">🥇 "+(lang==="lv"?"Labākie vārtu guvēji":lang==="es"?"Máximos goleadores":"Top scorers")+"</div>";
    for(var i=0;i<top.length;i++){
      var s=top[i];
      var balls="";
      for(var b=0;b<Math.min(s.goals,5);b++) balls+="⚽";
      html+="<div class=\"scorer-row\">";
      html+="<div class=\"scorer-pos\">"+(i+1)+"</div>";
      html+="<div class=\"scorer-flag\">"+(FLAGS[s.team]||"🌍")+"</div>";
      html+="<div style=\"flex:1\"><div class=\"scorer-name\">"+s.name+"</div><div class=\"scorer-team\">"+tTeam(s.team)+"</div></div>";
      html+="<div style=\"display:flex;align-items:center;gap:3px\">"+balls+"<span class=\"scorer-goals\">"+s.goals+"</span></div>";
      html+="</div>";
    }
    html+="</div>";
  } else {
    html+="<div class=\"chart-card\"><div class=\"chart-title\">🥇 "+(lang==="lv"?"Labākie vārtu guvēji":"Top scorers")+"</div>";
    html+="<div style=\"text-align:center;padding:20px;color:#4a6080;font-size:12px\">"+(lang==="lv"?"Vārtu guvēju dati nav pieejami bezmaksas plānā":"Goal scorer data not available on free plan")+"</div></div>";
  }

  // 3. Team form
  var tf={};
  for(var i=0;i<finished.length;i++){
    var m=finished[i];
    var h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
    var sc=m.score&&m.score.fullTime?m.score.fullTime:{};
    var s1=sc.home||0, s2=sc.away||0;
    if(!tf[h]) tf[h]={name:h,r:[],pts:0};
    if(!tf[a]) tf[a]={name:a,r:[],pts:0};
    if(s1>s2){tf[h].r.push("W");tf[h].pts+=3;tf[a].r.push("L");}
    else if(s1<s2){tf[a].r.push("W");tf[a].pts+=3;tf[h].r.push("L");}
    else{tf[h].r.push("D");tf[h].pts++;tf[a].r.push("D");tf[a].pts++;}
  }
  var fList=Object.values(tf).filter(function(x){return x.r.length>0;}).sort(function(a,b){return b.pts-a.pts;});
  if(fList.length){
    var wl=lang==="lv"?"U":lang==="es"?"G":"W";
    var dl=lang==="lv"?"N":lang==="es"?"E":"D";
    var ll=lang==="lv"?"Z":lang==="es"?"P":"L";
    html+="<div class=\"chart-card\">";
    html+="<div class=\"chart-title\">📈 "+(lang==="lv"?"Komandu forma":lang==="es"?"Forma de equipos":"Team form")+"</div>";
    html+="<div style=\"font-size:10px;color:#5a7fa8;margin-bottom:8px\">";
    html+="<span style=\"color:#27ae60\">■</span> "+wl+" &nbsp;<span style=\"color:#f39c12\">■</span> "+dl+" &nbsp;<span style=\"color:#e63946\">■</span> "+ll+"</div>";
    for(var i=0;i<fList.length;i++){
      var x=fList[i];
      html+="<div class=\"form-row\">";
      html+="<div class=\"form-name\">"+(FLAGS[x.name]||"🌍")+" "+tTeam(x.name)+"</div>";
      html+="<div class=\"form-dots\">";
      for(var j=0;j<x.r.length;j++){
        var r=x.r[j];
        var cls=r==="W"?"fd-w":r==="D"?"fd-d":"fd-l";
        var lbl=r==="W"?wl:r==="D"?dl:ll;
        html+="<div class=\"form-dot "+cls+"\">"+lbl+"</div>";
      }
      for(var j=x.r.length;j<3;j++) html+="<div class=\"form-dot fd-n\">·</div>";
      html+="</div>";
      html+="<div class=\"form-pts\">"+x.pts+"pts</div></div>";
    }
    html+="</div>";
  }

  html+="</div>";
  el.innerHTML=html;
}


function renderInfo(){
  var el=document.getElementById("tab-info");
  var tabs=["news","stadiums","ballon"];
  var lv=["📰 Jaunumi","🏟️ Stadioni","⭐ Zelta bumba"];
  var en=["📰 News","🏟️ Stadiums","⭐ Golden Ball"];
  var es=["📰 Noticias","🏟️ Estadios","⭐ Balón de Oro"];
  var labels=lang==="en"?en:lang==="es"?es:lv;
  var html="<div class=\"info-wrap\">";
  html+="<div class=\"info-tabs\">";
  for(var i=0;i<tabs.length;i++){
    var active=infoTab===tabs[i]?"active":"";
    html+="<button class=\"itab "+active+"\" onclick=\"setInfoTab('"+tabs[i]+"')\">"+labels[i]+"</button>";
  }
  html+="</div>";

  if(infoTab==="news"){
    var newsList=NEWS[lang]||NEWS.lv;
    for(var i=0;i<newsList.length;i++){
      var n=newsList[i];
      html+="<div class=\"news-card\" id=\"nc"+i+"\" onclick=\"toggleNews("+i+")\">";
      html+="<div style=\"display:flex;justify-content:space-between;align-items:flex-start\">";
      html+="<div class=\"news-title\">"+n.title+"</div>";
      html+="<span style=\"font-size:14px;color:#5a7fa8;margin-left:8px\">›</span></div>";
      html+="<div class=\"news-meta\">📅 "+n.date+" · <span style=\"color:#c8a84b\">"+n.tag+"</span></div>";
      html+="<div class=\"news-body\">"+n.body+"</div></div>";
    }
  } else if(infoTab==="stadiums"){
    for(var i=0;i<STADIUMS.length;i++){
      var s=STADIUMS[i];
      html+="<div class=\"stadium-card\">";
      html+="<div class=\"stadium-img\">"+s.e+"</div>";
      html+="<div class=\"stadium-info\">";
      html+="<div class=\"stadium-name\">"+s.n+(s.final?" 🏆":"")+"</div>";
      html+="<div class=\"stadium-city\">"+s.c+"</div>";
      html+="<div style=\"display:flex;gap:12px;margin-top:4px\">";
      html+="<span class=\"stadium-cap\">👥 "+s.cap+"</span>";
      html+="<span style=\"font-size:11px;color:#5a7fa8\">⚽ "+s.m+" sp.</span></div>";
      html+="<div style=\"font-size:11px;color:#6a8ab0;margin-top:6px;line-height:1.5\">"+s.f+"</div>";
      html+="</div></div>";
    }
  } else if(infoTab==="ballon"){
    var scored={};
    for(var i=0;i<matches.length;i++){
      var m=matches[i];
      if(!m.goals) continue;
      for(var j=0;j<m.goals.length;j++){
        var g=m.goals[j];
        if(!g.scorer||!g.scorer.name) continue;
        scored[g.scorer.name]=(scored[g.scorer.name]||0)+1;
      }
    }
    var glabel=lang==="lv"?"vārti":lang==="es"?"goles":"goals";
    var agelabel=lang==="lv"?"gadi":lang==="es"?"años":"yrs";
    var subtitle=lang==="lv"?"Zelta bumbas kandidāti":lang==="es"?"Candidatos al Balón de Oro":"Golden Ball candidates";
    html+="<div style=\"font-size:11px;color:#5a7fa8;margin-bottom:10px\">⭐ "+subtitle+"</div>";
    for(var i=0;i<BALLON.length;i++){
      var p=BALLON[i];
      var rg=scored[p.name]||0;
      html+="<div class=\"ballon-card\">";
      html+="<div class=\"ballon-pos\">"+p.pos+"</div>";
      html+="<div style=\"font-size:28px\">"+p.flag+"</div>";
      html+="<div class=\"ballon-info\">";
      html+="<div class=\"ballon-name\">"+p.name+"</div>";
      html+="<div class=\"ballon-team\">"+p.team+"</div>";
      html+="<div class=\"ballon-stats\">⚽ "+rg+" "+glabel+" · 🎂 "+p.age+" "+agelabel+"</div>";
      html+="<div style=\"font-size:10px;color:#6a8ab0;margin-top:3px\">"+p.note+"</div>";
      html+="</div><div class=\"ballon-odds\">"+p.odds+"</div></div>";
    }
  }
  html+="</div>";
  el.innerHTML=html;
}

function setInfoTab(tab){infoTab=tab;renderInfo();}
function toggleNews(i){
  var card=document.getElementById("nc"+i);
  card.classList.toggle("open");
}


// ── FAVORITE TEAM ──────────────────────────────────────────────────────────
function getFav(){ try{return localStorage.getItem("wc_fav")||"";}catch(e){return "";} }
function setFav(team){
  try{
    var cur=getFav();
    if(cur===team){localStorage.removeItem("wc_fav");}
    else{localStorage.setItem("wc_fav",team);}
  }catch(e){}
  renderTab();
}
function favStar(team){
  var on=getFav()===team;
  return '<span class="fav-star '+(on?"on":"")+'" onclick="event.stopPropagation();setFav(\''+team+'\')">'+(on?"⭐":"☆")+'</span>';
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
var searchQuery="";
function onSearch(){
  searchQuery=document.getElementById("searchInput").value.toLowerCase();
  renderTab();
}
function matchesSearch(m){
  if(!searchQuery) return true;
  var h=tTeam(norm(m.homeTeam.name)).toLowerCase();
  var a=tTeam(norm(m.awayTeam.name)).toLowerCase();
  var ho=norm(m.homeTeam.name).toLowerCase();
  var ao=norm(m.awayTeam.name).toLowerCase();
  return h.indexOf(searchQuery)>=0||a.indexOf(searchQuery)>=0||ho.indexOf(searchQuery)>=0||ao.indexOf(searchQuery)>=0;
}

function shareApp(){

// ── CALENDAR ───────────────────────────────────────────────────────────────
function addToCalendar(home,away,utcDate,venue){
  var start=new Date(utcDate);
  var end=new Date(start.getTime()+2*60*60*1000);
  function fmt(d){return d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";}
  var title=encodeURIComponent("⚽ "+home+" vs "+away);
  var details=encodeURIComponent("FIFA World Cup 2026 · "+venue+" · wcup2026.eu");
  var loc=encodeURIComponent(venue);
  var gcal="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&dates="+fmt(start)+"/"+fmt(end)+"&details="+details+"&location="+loc;
  window.open(gcal,"_blank");
}


// ── MATCH DETAILS ──────────────────────────────────────────────────────────
function openMatch(id){
  var m=null;
  for(var i=0;i<matches.length;i++){if(String(matches[i].id)===String(id)){m=matches[i];break;}}
  if(!m) return;

  var h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
  var hf=FLAGS[h]||"🌍", af=FLAGS[a]||"🌍";
  var sc=m.score&&m.score.fullTime?m.score.fullTime:{};
  var ht=m.score&&m.score.halfTime?m.score.halfTime:{};
  var hasScore=sc.home!==null&&sc.home!==undefined&&m.status!=="TIMED"&&m.status!=="SCHEDULED";
  var ft=formatTimes(m.utcDate);
  var venueName=tVenue(m.venue||"")||m.venue||"";

  var grp="KO",color="#c8a84b";
  var gkeys=Object.keys(GROUPS_STATIC);
  for(var gi=0;gi<gkeys.length;gi++){
    if(GROUPS_STATIC[gkeys[gi]].indexOf(h)>=0||GROUPS_STATIC[gkeys[gi]].indexOf(a)>=0){grp=gkeys[gi];color=GC[gkeys[gi]];break;}
  }

  document.getElementById("mmTitle").textContent=tTeam(h)+" vs "+tTeam(a);
  document.getElementById("mmSub").textContent=(grp==="KO"?t("ko"):t("group")+" "+grp)+" · "+ft.date;

  var body="";

  // Score header
  body+='<div style="background:linear-gradient(135deg,#10192a,#0a1628);border-radius:12px;padding:18px;margin-bottom:16px;text-align:center;border:1px solid '+color+'">';
  body+='<div style="display:flex;align-items:center;justify-content:center;gap:14px">';
  body+='<div style="flex:1;text-align:right"><div style="font-size:32px">'+hf+'</div><div style="font-size:13px;font-weight:700;color:#ddeeff;margin-top:4px">'+tTeam(h)+'</div></div>';
  if(hasScore){
    body+='<div style="font-size:36px;font-weight:900;color:#c8a84b;min-width:80px">'+sc.home+' : '+sc.away+'</div>';
  } else {
    body+='<div style="font-size:14px;color:#5a7fa8;min-width:80px">'+ft.riga+'<br><span style="font-size:10px">'+USER_TZ_LABEL+'</span></div>';
  }
  body+='<div style="flex:1;text-align:left"><div style="font-size:32px">'+af+'</div><div style="font-size:13px;font-weight:700;color:#ddeeff;margin-top:4px">'+tTeam(a)+'</div></div>';
  body+='</div>';
  if(hasScore&&ht.home!==null&&ht.home!==undefined){
    body+='<div style="font-size:10px;color:#5a7fa8;margin-top:10px">'+(lang==="lv"?"1. puslaiks":lang==="es"?"Primer tiempo":"Half-time")+': '+ht.home+':'+ht.away+'</div>';
  }
  var statusTxt=m.status==="FINISHED"?(lang==="lv"?"Spēle pabeigta":lang==="es"?"Finalizado":"Full time"):
    (m.status==="IN_PLAY"||m.status==="PAUSED")?"🔴 LIVE":
    (lang==="lv"?"Gaidāma":lang==="es"?"Próximo":"Upcoming");
  body+='<div style="font-size:11px;color:#c8a84b;margin-top:6px;font-weight:700">'+statusTxt+'</div>';
  body+='</div>';

  // Goals
  if(hasScore&&m.goals&&m.goals.length){
    body+='<div class="msec"><div class="mstitle" style="color:'+color+'">⚽ '+(lang==="lv"?"Vārti":lang==="es"?"Goles":"Goals")+'</div>';
    for(var i=0;i<m.goals.length;i++){
      var g=m.goals[i];
      var teamName=g.team&&g.team.id===m.homeTeam.id?tTeam(h):tTeam(a);
      var teamFlag=g.team&&g.team.id===m.homeTeam.id?hf:af;
      body+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #111c2a">';
      body+='<span style="font-size:14px">'+teamFlag+'</span>';
      body+='<span style="font-size:12px;color:#ddeeff;flex:1">'+(g.scorer&&g.scorer.name?g.scorer.name:"?")+'</span>';
      body+='<span style="font-size:11px;color:#c8a84b;font-weight:800">'+(g.minute||"?")+"'"+'</span>';
      body+='</div>';
    }
    body+='</div>';
  }

  // Match info
  body+='<div class="msec"><div class="mstitle" style="color:'+color+'">📋 '+(lang==="lv"?"Informācija":lang==="es"?"Información":"Match info")+'</div>';
  body+='<div style="background:#10192a;border-radius:8px;padding:12px">';
  body+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #111c2a"><span style="font-size:11px;color:#5a7fa8">🏟️ '+(lang==="lv"?"Stadions":lang==="es"?"Estadio":"Stadium")+'</span><span style="font-size:11px;color:#ddeeff;text-align:right">'+venueName+'</span></div>';
  body+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #111c2a"><span style="font-size:11px;color:#5a7fa8">📅 '+(lang==="lv"?"Datums":lang==="es"?"Fecha":"Date")+'</span><span style="font-size:11px;color:#ddeeff">'+ft.date+' '+ft.riga+'</span></div>';
  if(m.referees&&m.referees.length){
    var ref=m.referees[0];
    body+='<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:11px;color:#5a7fa8">👨‍⚖️ '+(lang==="lv"?"Tiesnesis":lang==="es"?"Árbitro":"Referee")+'</span><span style="font-size:11px;color:#ddeeff">'+ref.name+(ref.nationality?" ("+ref.nationality+")":"")+'</span></div>';
  }
  body+='</div></div>';

  // Squads (from our data)
  var hSquad=SQUADS[h], aSquad=SQUADS[a];
  if(hSquad||aSquad){
    body+='<div class="msec"><div class="mstitle" style="color:'+color+'">👕 '+(lang==="lv"?"Galvenie spēlētāji":lang==="es"?"Jugadores clave":"Key players")+'</div>';
    body+='<div style="display:flex;gap:8px">';
    body+='<div style="flex:1">';
    body+='<div style="font-size:11px;font-weight:800;color:#ddeeff;margin-bottom:6px">'+hf+' '+tTeam(h)+'</div>';
    if(hSquad){for(var i=0;i<Math.min(hSquad.length,5);i++){body+='<div style="font-size:10px;color:#8fa3c8;padding:2px 0">'+hSquad[i].name+' <span style="color:#4a6080">'+hSquad[i].pos+'</span></div>';}}
    else{body+='<div style="font-size:10px;color:#4a6080">—</div>';}
    body+='</div>';
    body+='<div style="flex:1">';
    body+='<div style="font-size:11px;font-weight:800;color:#ddeeff;margin-bottom:6px">'+af+' '+tTeam(a)+'</div>';
    if(aSquad){for(var i=0;i<Math.min(aSquad.length,5);i++){body+='<div style="font-size:10px;color:#8fa3c8;padding:2px 0">'+aSquad[i].name+' <span style="color:#4a6080">'+aSquad[i].pos+'</span></div>';}}
    else{body+='<div style="font-size:10px;color:#4a6080">—</div>';}
    body+='</div>';
    body+='</div></div>';
  }

  // Watch / follow links
  var ytQuery=encodeURIComponent(h+" vs "+a+" World Cup 2026 highlights");
  var ytUrl="https://www.youtube.com/results?search_query="+ytQuery;
  var fifaUrl="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026";
  var watchTitle=lang==="lv"?"Skatīties / Sekot":lang==="es"?"Ver / Seguir":"Watch / Follow";
  var ytLabel=hasScore?(lang==="lv"?"Spēles momenti":lang==="es"?"Resúmenes":"Highlights"):(lang==="lv"?"Tiešraide / momenti":lang==="es"?"En vivo":"Live / clips");
  body+='<div class="msec"><div class="mstitle" style="color:'+color+'">📺 '+watchTitle+'</div>';
  body+='<a href="'+ytUrl+'" target="_blank" style="display:flex;align-items:center;gap:10px;background:#10192a;border-radius:8px;padding:12px;margin-bottom:6px;text-decoration:none;border-left:3px solid #ff0000">';
  body+='<span style="font-size:22px">▶️</span>';
  body+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#ddeeff">YouTube</div><div style="font-size:10px;color:#5a7fa8">'+ytLabel+'</div></div>';
  body+='<span style="font-size:12px;color:#5a7fa8">›</span></a>';
  body+='<a href="'+fifaUrl+'" target="_blank" style="display:flex;align-items:center;gap:10px;background:#10192a;border-radius:8px;padding:12px;text-decoration:none;border-left:3px solid #326295">';
  body+='<span style="font-size:22px">🌐</span>';
  body+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#ddeeff">FIFA.com</div><div style="font-size:10px;color:#5a7fa8">'+(lang==="lv"?"Oficiālā lapa":lang==="es"?"Sitio oficial":"Official site")+'</div></div>';
  body+='<span style="font-size:12px;color:#5a7fa8">›</span></a>';
  body+='</div>';

  // Team profile links
  body+='<div class="msec"><div style="display:flex;gap:8px">';
  body+='<button onclick="closeMatch();openTeam(\''+h+'\')" style="flex:1;background:#10192a;border:1px solid '+color+';border-radius:8px;padding:10px;color:#ddeeff;font-size:12px;cursor:pointer">'+hf+' '+tTeam(h)+' ›</button>';
  body+='<button onclick="closeMatch();openTeam(\''+a+'\')" style="flex:1;background:#10192a;border:1px solid '+color+';border-radius:8px;padding:10px;color:#ddeeff;font-size:12px;cursor:pointer">'+af+' '+tTeam(a)+' ›</button>';
  body+='</div></div>';

  document.getElementById("mmBody").innerHTML=body;
  document.getElementById("matchModal").classList.remove("hidden");
  document.body.style.overflow="hidden";
}

function closeMatch(){
  document.getElementById("matchModal").classList.add("hidden");
  document.body.style.overflow="";
}
