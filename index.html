// Auto-detect user timezone
const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const USER_TZ_LABEL = USER_TZ.split('/').pop().replace(/_/g,' ');

function formatTimes(utcDateStr){
  const dt=new Date(utcDateStr);
  const local=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:USER_TZ});
  const utc=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:'UTC'});
  const date=dt.toLocaleDateString([],{day:'2-digit',month:'short',timeZone:USER_TZ});
  return{riga:local,utc,date};
}

let matches=[], standingsData={}, currentTab='today', gFilter='ALL', liveTimer=null;

async function apiFetch(path){
  const r=await fetch(BASE+path);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadAll(){
  setSt('loading',t('loading'));
  try{
    const mData=await apiFetch('/competitions/WC/matches');
    matches=mData.matches||[];
    try{
      const sData=await apiFetch('/competitions/WC/standings');
      standingsData={};
      for(const sg of (sData.standings||[])){
        const letter=sg.group?sg.group.replace('GROUP_','').replace('Group ','').slice(-1):'?';
        standingsData[letter]=sg.table||[];
      }
    }catch(e2){standingsData={};}
    const played=matches.filter(m=>m.status==='FINISHED').length;
  setSt('live',`${t('updated')} ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} В· ${played} ${t('played')} В· рҹ•җ ${USER_TZ_LABEL}`);
  }catch(e){
    setSt('error',t('error')+': '+e.message);
  }
  renderTab();
  clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    if(matches.some(m=>m.status==='IN_PLAY'||m.status==='PAUSED')) loadAll();
  },30000);
}

function setSt(tp,txt){
  document.getElementById('sdot').className='sdot '+tp;
  document.getElementById('stxt').textContent=txt;
}

function sw(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((tb,i)=>tb.classList.toggle('active',['today','results','schedule','standings','groups','stats','info'][i]===tab));
  ['today','results','schedule','standings','groups','stats','info'].forEach(tb=>document.getElementById('tab-'+tb).classList.toggle('hidden',tb!==tab));
  renderTab();
}

function renderTab(){
  if(currentTab==='today')     renderToday();
  if(currentTab==='results')   renderResults();
  if(currentTab==='schedule')  renderSchedule();
  if(currentTab==='standings') renderStandings();
  if(currentTab==='groups')    renderGroups();
  if(currentTab==='stats')     renderStats();
  if(currentTab==='info')      renderInfo();
}

function todayStr(){return new Date().toLocaleDateString('sv-SE',{timeZone:USER_TZ});}

function renderToday(){
  const el=document.getElementById('tab-today');
  const td=todayStr();
  const live=matches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  const todayFT=matches.filter(m=>m.utcDate.slice(0,10)===td&&m.status==='FINISHED');
  const todayNS=matches.filter(m=>m.utcDate.slice(0,10)===td&&(m.status==='TIMED'||m.status==='SCHEDULED'));
  let html='';
  if(live.length){html+=`<div class="sec-title" style="color:#27ae60">${t('sec_live')} вҖ” ${live.length}</div>`+live.map(m=>mCard(m)).join('');}
  if(todayFT.length){html+=`<div class="sec-title" style="color:#c8a84b">${t('sec_today')}</div>`+todayFT.map(m=>mCard(m)).join('');}
  if(todayNS.length){html+=`<div class="sec-title" style="color:#2980b9">${t('sec_upcoming')}</div>`+todayNS.map(m=>mCard(m)).join('');}
  if(!html){
    const next=matches.filter(m=>m.status==='TIMED'||m.status==='SCHEDULED').sort((a,b)=>a.utcDate.localeCompare(b.utcDate)).slice(0,5);
    html=next.length?`<div class="sec-title" style="color:#2980b9">${t('sec_next')}</div>`+next.map(m=>mCard(m)).join(''):`<div class="loader">${t('no_data')}</div>`;
  }
  el.innerHTML=html;
}

function renderResults(){
  const el=document.getElementById('tab-results');
  const done=matches.filter(m=>m.status==='FINISHED').sort((a,b)=>b.utcDate.localeCompare(a.utcDate));
  if(!done.length){el.innerHTML=`<div class="loader">вҡҪ ${t('no_results')}<br><small style="color:#4a6080">${t('tournament_starts')}</small></div>`;return;}
  el.innerHTML=`<div style="font-size:11px;color:#4a6080;margin:10px 0 8px">${done.length} ${t('played')}</div>`+done.map(m=>mCard(m)).join('');
}

function renderSchedule(){
  const el=document.getElementById('tab-schedule');

  let list=[...matches].sort((a,b)=>a.utcDate.localeCompare(b.utcDate));

    const ts=GROUPS_STATIC[gFilter]||[];

}

function mCard(m){
  const h=norm(m.homeTeam.name), a=norm(m.awayTeam.name);
  const hf=FLAGS[h]||'рҹҢҚ', af=FLAGS[a]||'рҹҢҚ';
  const sc=m.score?.fullTime||m.score?.halfTime||{};
  const s1=sc.home??null, s2=sc.away??null;
  const hasScore=s1!==null&&s2!==null&&m.status!=='TIMED'&&m.status!=='SCHEDULED'&&m.status!=='NS';
  const h1w=hasScore&&s1>s2, h2w=hasScore&&s2>s1;
  const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  const {riga,utc,date}=formatTimes(m.utcDate);

  let grp='KO',color='#c8a84b';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(h)||ts.includes(a)){grp=g;color=GC[g];break;}}

  let badge='';
  if(isLive) badge=`<span class="sbadge sb-live">рҹ”ҙ ${m.status==='PAUSED'?'HT':((m.minute||0)+"'")} </span>`;
  else if(m.status==='FINISHED') badge=`<span class="sbadge sb-ft">FT</span>`;
  else badge=`<span class="sbadge sb-sched">${riga}</span>`;

function openTeam(name){
  let grp='?';
  for(const [g,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(name)){grp=g;break;}}
  const color=GC[grp]||'#888';
  document.getElementById('mname').textContent=tTeam(name);
  document.getElementById('mflag').textContent=FLAGS[name]||'рҹҢҚ';
  document.getElementById('msub').textContent=`${t('group')} ${grp} В· FIFA World Cup 2026`;
  let body='';

  // Standings
  const grpTable=standingsData[grp];
  if(grpTable&&grpTable.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">рҹ“Ҡ ${t('stand_title')}</div>
    <table class="mini-st"><thead><tr>
      <th>${t('col_team')}</th><th>${t('col_p')}</th><th>${t('col_w')}</th><th>${t('col_d')}</th><th>${t('col_l')}</th><th>GF:GA</th><th>${t('col_pts')}</th>
    </tr></thead><tbody>
    ${grpTable.map((tb,i)=>`<tr class="${norm(tb.team.name)===name?'hl':''}">
      <td><span class="pnum">${i+1}</span>${FLAGS[norm(tb.team.name)]||'рҹҢҚ'} ${tTeam(norm(tb.team.name))}</td>
      <td>${tb.playedGames}</td><td>${tb.won}</td><td>${tb.draw}</td><td>${tb.lost}</td>
      <td>${tb.goalsFor}:${tb.goalsAgainst}</td>
      <td><strong style="color:${i<2?'#c8a84b':'#eaeaea'}">${tb.points}</strong></td>
    </tr>`).join('')}</tbody></table></div>`;
  }

  // Matches
  const tm=matches.filter(m=>norm(m.homeTeam.name)===name||norm(m.awayTeam.name)===name).sort((a,b)=>a.utcDate.localeCompare(b.utcDate));
  if(tm.length){
    body+=`<div class="msec"><div class="mstitle" style="color:${color}">вҡҪ ${t('matches_title')}</div>`;
    body+=tm.map(m=>{
      const isH=norm(m.homeTeam.name)===name;
      const opp=isH?norm(m.awayTeam.name):norm(m.homeTeam.name);
      const sc=m.score?.fullTime||m.score?.halfTime||{};
      const myS=isH?(sc.home??null):(sc.away??null), oppS=isH?(sc.away??null):(sc.home??null);
      const hasS=myS!==null&&oppS!==null&&m.status==='FINISHED';
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      const {riga,date}=formatTimes(m.utcDate);
      let res='';
      if(hasS){
        if(myS>oppS) res='<span style="color:#27ae60;font-weight:800;font-size:10px;margin-left:4px">вң“</span>';
        else if(myS<oppS) res='<span style="color:#e63946;font-weight:800;font-size:10px;margin-left:4px">вң—</span>';
        else res='<span style="color:#f39c12;font-weight:800;font-size:10px;margin-left:4px">=</span>';
      }
      return`<div class="mmatch" style="border-left-color:${color}${isLive?';background:#091f14':''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span>${FLAGS[name]||'рҹҢҚ'}</span>
          <span style="font-size:12px;font-weight:700;flex:1">${tTeam(name)}</span>
          ${hasS?`<span style="font-size:15px;font-weight:900;color:#c8a84b">${myS}:${oppS}</span>`:'<span style="font-size:11px;color:#5a7fa8">vs</span>'}
          <span style="font-size:12px;font-weight:700">${tTeam(opp)}</span>
          <span>${FLAGS[opp]||'рҹҢҚ'}</span>
        </div>
        <div style="font-size:10px;color:#5a7fa8">${date} ${riga}${hasS?' В· FT'+res:isLive?' В· рҹ”ҙ LIVE':''}</div>
      </div>`;
    }).join('');
    body+='</div>';
  }

  const squad=SQUADS[name];
  body+=`<div class="msec"><div class="mstitle" style="color:${color}">рҹ‘• ${t('squad_title')}</div>`;
  if(squad){
    body+=`<div class="pgrid">${squad.map(p=>`<div class="pc"><div class="ppos">${p.pos}</div><div class="pname">${p.name}</div><div class="pclub">${p.club}</div></div>`).join('')}</div>`;
  } else {
    body+=`<div style="text-align:center;padding:20px;color:#4a6080;font-size:12px">${t('no_squad')}</div>`;
  }
  body+='</div>';

  document.getElementById('mbody').innerHTML=body;
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function closeMod(){
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow='';
}

function renderStats(){
  const el=document.getElementById('tab-stats');
  const finished=matches.filter(m=>m.status==='FINISHED');
  if(!finished.length){
    el.innerHTML=`<div class="no-stats">рҹ“Ҡ ${t('no_results')}<br><br><small style="color:#4a6080">${t('tournament_starts')}</small></div>`;
    return;
  }
  let html='<div class="stats-wrap">';

  // 1. Goals per group
  const groupGoals={};
  for(const m of finished){
    const h=norm(m.homeTeam.name),a=norm(m.awayTeam.name);
    const sc=m.score?.fullTime||{};
    const g=(sc.home??0)+(sc.away??0);
    let grp='?';
    for(const [gr,ts] of Object.entries(GROUPS_STATIC)){if(ts.includes(h)||ts.includes(a)){grp=gr;break;}}
    if(!groupGoals[grp]) groupGoals[grp]={goals:0,matches:0};
    groupGoals[grp].goals+=g; groupGoals[grp].matches++;
  }
  const maxG=Math.max(...Object.values(groupGoals).map(g=>g.goals),1);
  const totalGoals=Object.values(groupGoals).reduce((s,g)=>s+g.goals,0);
  const avgGoals=(totalGoals/finished.length).toFixed(1);
  html+=`<div class="chart-card">
    <div class="chart-title">вҡҪ ${lang==='lv'?'VДҒrti pa grupДҒm':lang==='es'?'Goles por grupo':'Goals by group'}</div>
    <div style="font-size:10px;color:#5a7fa8;margin-bottom:10px">${lang==='lv'?'KopДҒ':'Total'}: ${totalGoals} В· ${lang==='lv'?'VidД“ji':'Avg'}: ${avgGoals}/sp.</div>
    ${Object.entries(groupGoals).sort((a,b)=>b[1].goals-a[1].goals).map(([grp,d])=>{
      const color=GC[grp]||'#888';
      const pct=Math.round((d.goals/maxG)*100);
      const avg=(d.goals/d.matches).toFixed(1);
      return`<div class="bar-row">
        <div class="bar-label"><span style="color:${color};font-weight:800">${t('group')} ${grp}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"><span class="bar-val">${d.goals}</span></div></div>
        <div style="font-size:10px;color:#5a7fa8;min-width:32px">${avg}/sp.</div>
      </div>`;
    }).join('')}
  </div>`;

  // 2. Top scorers
  const scorers={};
  for(const m of finished){
    if(!m.goals) continue;
    for(const g of m.goals){
      if(!g.scorer?.name) continue;
      const key=g.scorer.name;
      const team=norm(g.team?.name||'');
      if(!scorers[key]) scorers[key]={name:key,team,goals:0};
      scorers[key].goals++;
    }
  }
  const top=Object.values(scorers).sort((a,b)=>b.goals-a.goals).slice(0,10);
  if(top.length){
    html+=`<div class="chart-card">
      <div class="chart-title">рҹҘҮ ${lang==='lv'?'LabДҒkie vДҒrtu guvД“ji':lang==='es'?'MГЎximos goleadores':'Top scorers'}</div>
      ${top.map((s,i)=>`<div class="scorer-row">
        <div class="scorer-pos">${i+1}</div>
        <div class="scorer-flag">${FLAGS[s.team]||'рҹҢҚ'}</div>
        <div style="flex:1"><div class="scorer-name">${s.name}</div><div class="scorer-team">${tTeam(s.team)}</div></div>
        <div style="display:flex;align-items:center;gap:3px">${'вҡҪ'.repeat(Math.min(s.goals,5))}<span class="scorer-goals">${s.goals}</span></div>
      </div>`).join('')}
    </div>`;
  }

  // 3. Team form
  const tf={};
  for(const m of finished){
    const h=norm(m.homeTeam.name),a=norm(m.awayTeam.name);
    const sc=m.score?.fullTime||{};
    const s1=sc.home??0,s2=sc.away??0;
    if(!tf[h]) tf[h]={name:h,r:[],pts:0};
    if(!tf[a]) tf[a]={name:a,r:[],pts:0};
    if(s1>s2){tf[h].r.push('W');tf[h].pts+=3;tf[a].r.push('L');}
    else if(s1<s2){tf[a].r.push('W');tf[a].pts+=3;tf[h].r.push('L');}
    else{tf[h].r.push('D');tf[h].pts++;tf[a].r.push('D');tf[a].pts++;}
  }
  const fList=Object.values(tf).filter(x=>x.r.length>0).sort((a,b)=>b.pts-a.pts);
  if(fList.length){
    html+=`<div class="chart-card">
      <div class="chart-title">рҹ“Ҳ ${lang==='lv'?'Komandu forma':lang==='es'?'Forma':'Team form'}</div>
      <div style="font-size:10px;color:#5a7fa8;margin-bottom:8px">
        <span style="color:#27ae60">в– </span> ${lang==='lv'?'U':lang==='es'?'G':'W'} &nbsp;
        <span style="color:#f39c12">в– </span> ${lang==='lv'?'N':lang==='es'?'E':'D'} &nbsp;
        <span style="color:#e63946">в– </span> ${lang==='lv'?'Z':lang==='es'?'P':'L'}
      </div>
      ${fList.map(x=>`<div class="form-row">
        <div class="form-name">${FLAGS[x.name]||'рҹҢҚ'} ${tTeam(x.name)}</div>
        <div class="form-dots">
          ${x.r.map(r=>`<div class="form-dot ${r==='W'?'fd-w':r==='D'?'fd-d':'fd-l'}">${r}</div>`).join('')}
          ${Array(Math.max(0,3-x.r.length)).fill('<div class="form-dot fd-n">В·</div>').join('')}
        </div>
        <div class="form-pts">${x.pts}pts</div>
      </div>`).join('')}
    </div>`;
  }

  html+='</div>';
  el.innerHTML=html;
}

    const scored={};
    for(const m of matches){
      if(!m.goals) continue;
      for(const g of m.goals){
        if(!g.scorer?.name) continue;
        scored[g.scorer.name]=(scored[g.scorer.name]||0)+1;
      }
    }
    const glabel=lang==="lv"?"vДҒrti":lang==="es"?"goles":"goals";
    const agelabel=lang==="lv"?"gadi":lang==="es"?"aГұos":"yrs";
    const subtitle=lang==="lv"?"Zelta bumbas kandidДҒti":lang==="es"?"Candidatos al BalГіn de Oro":"Golden Ball candidates";
    html+='<div style="font-size:11px;color:#5a7fa8;margin-bottom:10px">вӯҗ '+subtitle+'</div>';
    html+=BALLON.map(p=>{
      const rg=scored[p.name]||0;
      return '<div class="ballon-card">'+
        '<div class="ballon-pos">'+p.pos+'</div>'+
        '<div style="font-size:28px">'+p.flag+'</div>'+
        '<div class="ballon-info">'+
        '<div class="ballon-name">'+p.name+'</div>'+
        '<div class="ballon-team">'+p.team+'</div>'+
        '<div class="ballon-stats">вҡҪ '+rg+' '+glabel+' В· рҹҺӮ '+p.age+' '+agelabel+'</div>'+
        '<div style="font-size:10px;color:#6a8ab0;margin-top:3px">'+p.note+'</div>'+
        '</div><div class="ballon-odds">'+p.odds+'</div></div>';
    }).join("");
  }
  html+="</div>";
  el.innerHTML=html;
}

function setInfoTab(tab){infoTab=tab;renderInfo();}
function toggleNews(i){
  const card=document.getElementById("nc"+i);
  card.classList.toggle("open");
}


loadAll();
</script>
